<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenoClínica - Malformaciones Congénitas</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Ocultar barra de desplazamiento manteniendo funcionalidad */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <!-- Aquí es donde React "dibujará" la aplicación -->
    <div id="root"></div>

    <!-- Script principal de la aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SISTEMA DE ICONOS (Adaptación para HTML puro) ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = '';
                    const iconNode = lucide.icons[name];
                    if (iconNode) {
                        const svg = lucide.createElement(iconNode);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        spanRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        // Mapeo de iconos
        const Activity = (p) => <LucideIcon name="activity" {...p} />;
        const Baby = (p) => <LucideIcon name="baby" {...p} />;
        const Stethoscope = (p) => <LucideIcon name="stethoscope" {...p} />;
        const Microscope = (p) => <LucideIcon name="microscope" {...p} />;
        const BookOpen = (p) => <LucideIcon name="book-open" {...p} />;
        const Calculator = (p) => <LucideIcon name="calculator" {...p} />;
        const ShieldAlert = (p) => <LucideIcon name="shield-alert" {...p} />;
        const Calendar = (p) => <LucideIcon name="calendar" {...p} />;
        const Dna = (p) => <LucideIcon name="dna" {...p} />;
        const Syringe = (p) => <LucideIcon name="syringe" {...p} />;
        const FileText = (p) => <LucideIcon name="file-text" {...p} />;
        const Menu = (p) => <LucideIcon name="menu" {...p} />;
        const X = (p) => <LucideIcon name="x" {...p} />;
        const HelpCircle = (p) => <LucideIcon name="help-circle" {...p} />;
        const CheckCircle2 = (p) => <LucideIcon name="check-circle-2" {...p} />;
        const XCircle = (p) => <LucideIcon name="x-circle" {...p} />;
        const HeartPulse = (p) => <LucideIcon name="heart-pulse" {...p} />;
        const Brain = (p) => <LucideIcon name="brain" {...p} />;
        const Bone = (p) => <LucideIcon name="bone" {...p} />;
        const ArrowRight = (p) => <LucideIcon name="arrow-right" {...p} />;
        const ImageIcon = (p) => <LucideIcon name="image" {...p} />;
        const PenTool = (p) => <LucideIcon name="pen-tool" {...p} />;

        // --- CÓDIGO DE LA APLICACIÓN ---

        function App() {
          const [activeTab, setActiveTab] = useState('inicio');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const handleTabChange = (tab) => {
            setActiveTab(tab);
            setIsMobileMenuOpen(false);
          };

          const renderContent = () => {
            switch(activeTab) {
              case 'inicio': return <Inicio />;
              case 'fisiopatologia': return <Fisiopatologia />;
              case 'diagnostico': return <Diagnostico />;
              case 'patologias': return <Patologias />;
              case 'simuladores': return <Simuladores />;
              case 'casos': return <CasosClinicos />;
              default: return <Inicio />;
            }
          };

          return (
            <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
              
              {/* Mobile Header */}
              <header className="md:hidden bg-slate-950 text-white p-4 flex justify-between items-center z-30 shadow-md shrink-0">
                <div className="flex items-center gap-3">
                  <Baby className="text-indigo-400" size={24} />
                  <h1 className="text-xl font-bold">GenoClínica</h1>
                </div>
                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="p-2 bg-slate-800 rounded-lg text-slate-100 hover:bg-slate-700 transition-colors"
                >
                  {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              </header>

              {/* Navigation Sidebar */}
              <nav className={`
                ${isMobileMenuOpen ? 'flex' : 'hidden'} 
                md:flex absolute md:relative top-[72px] md:top-0 w-full md:w-72 h-[calc(100vh-72px)] md:h-full 
                bg-slate-900 text-slate-100 flex-col shadow-2xl z-20 transition-all duration-300 shrink-0
              `}>
                <div className="hidden md:block p-6 border-b border-slate-800 bg-slate-950">
                  <h1 className="text-2xl font-bold flex items-center gap-3">
                    <Baby className="text-indigo-400" size={28} /> 
                    GenoClínica
                  </h1>
                  <p className="text-xs text-slate-400 mt-2 tracking-wide uppercase font-semibold">Medicina Humana Integrada</p>
                </div>
                <div className="flex-1 overflow-y-auto py-4 px-3 space-y-1">
                  <NavItem icon={<BookOpen size={20}/>} label="Introducción y Glosario" active={activeTab === 'inicio'} onClick={() => handleTabChange('inicio')} />
                  <NavItem icon={<Microscope size={20}/>} label="Básicas: Fisiopatología" active={activeTab === 'fisiopatologia'} onClick={() => handleTabChange('fisiopatologia')} />
                  <NavItem icon={<Activity size={20}/>} label="Clínicas: Diagnóstico" active={activeTab === 'diagnostico'} onClick={() => handleTabChange('diagnostico')} />
                  <NavItem icon={<Dna size={20}/>} label="Atlas de Patologías" active={activeTab === 'patologias'} onClick={() => handleTabChange('patologias')} />
                  
                  <div className="pt-4 pb-2">
                    <p className="px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Práctica y Entrenamiento</p>
                  </div>
                  <NavItem icon={<Calculator size={20}/>} label="Simuladores Clínicos" active={activeTab === 'simuladores'} onClick={() => handleTabChange('simuladores')} />
                  <NavItem icon={<HelpCircle size={20}/>} label="Casos Clínicos (Quiz)" active={activeTab === 'casos'} onClick={() => handleTabChange('casos')} />
                </div>
                <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center hidden md:block">
                  Creado para docencia médica.
                </div>
              </nav>

              {/* Main Content Area */}
              <main className="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 bg-slate-100 relative z-10 w-full">
                <div className="max-w-6xl mx-auto pb-12">
                  {renderContent()}
                </div>
              </main>
            </div>
          );
        }

        function Inicio() {
          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="bg-gradient-to-r from-indigo-600 to-blue-700 rounded-2xl md:rounded-3xl p-6 sm:p-8 md:p-10 text-white shadow-xl relative overflow-hidden break-words">
                <div className="relative z-10">
                  <h2 className="text-3xl md:text-4xl lg:text-5xl font-extrabold mb-4 leading-tight">Malformaciones Congénitas</h2>
                  <p className="text-indigo-100 text-lg md:text-xl max-w-2xl leading-relaxed">
                    De la morfogénesis básica celular al manejo multidisciplinario quirúrgico y genético avanzado.
                  </p>
                </div>
                <Dna className="absolute -right-10 -bottom-10 text-indigo-500/30 w-48 h-48 md:w-64 md:h-64" />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                <InfoCard title="Epidemiología Global" icon={<Activity className="text-rose-500" size={24}/>}>
                  Afectan al <strong>3-6%</strong> de los nacidos vivos. Son una de las principales causas de morbimortalidad infantil global (Datos ECLAMC) y demandan alta inversión en salud pública.
                </InfoCard>
                <InfoCard title="Etiología Compleja" icon={<Microscope className="text-purple-500" size={24}/>}>
                  50% Desconocida, 25% Multifactorial (genética + ambiente), 25% Genética pura (cromosómica o monogénica) y un pequeño porcentaje netamente teratogénico.
                </InfoCard>
                <InfoCard title="El Reto Clínico" icon={<Stethoscope className="text-teal-500" size={24}/>}>
                  Requiere integración transversal: ciencias básicas (embriología) en primeros ciclos y ciencias clínicas (imagenología, cirugía, genética) en el internado.
                </InfoCard>
              </div>

              <div className="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-200 mt-6">
                <h3 className="text-xl md:text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                  <FileText className="text-indigo-600 shrink-0" /> Glosario de Dismorfología
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                  <DefItem term="Malformación" type="Primaria" def="Defecto estructural primario. El tejido se formó anormalmente desde el inicio celular (ej. Labio leporino, Espina Bífida)." />
                  <DefItem term="Deformación" type="Secundaria" def="Alteración de la forma por fuerzas mecánicas sobre un tejido que ya era normal (ej. Pie zambo por oligohidramnios severo)." />
                  <DefItem term="Disrupción" type="Destructiva" def="Destrucción de un tejido previamente normal, a menudo por isquemia o bridas (ej. Síndrome de banda amniótica amputando un miembro)." />
                  <DefItem term="Secuencia" type="Cascada" def="Una anomalía primaria única desencadena defectos secundarios en cascada (ej. Secuencia de Pierre Robin: micrognatia -> glosoptosis -> paladar hendido)." />
                </div>
              </div>
            </div>
          );
        }

        function Fisiopatologia() {
          return (
            <div className="space-y-6 md:space-y-8 animate-in slide-in-from-bottom-4 duration-500">
              <div className="border-b border-slate-300 pb-4">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800">Etiología y Fisiopatología</h2>
                <p className="text-slate-500 mt-2 text-sm md:text-base">Bases embriológicas y agentes teratógenos.</p>
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-200">
                  <h3 className="text-lg md:text-xl font-bold mb-6 flex items-center gap-2"><Dna className="text-purple-600 shrink-0"/> Genética vs Ambiente</h3>
                  <div className="space-y-6">
                    <ProgressBar label="Desconocida / Multifactorial" percent="68" colorClass="bg-slate-400" textClass="text-slate-700" />
                    <ProgressBar label="Genética (Cromosomopatías / Monogénicas)" percent="25" colorClass="bg-blue-500" textClass="text-blue-700" />
                    <ProgressBar label="Ambiental (Teratógenos puros)" percent="7" colorClass="bg-rose-500" textClass="text-rose-700" />
                  </div>
                </div>

                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-200">
                  <h3 className="text-lg md:text-xl font-bold mb-6 flex items-center gap-2"><ShieldAlert className="text-orange-500 shrink-0"/> Teratógenos Clásicos</h3>
                  <div className="space-y-4">
                    <div className="p-4 bg-orange-50 rounded-lg border border-orange-100 break-words">
                      <h4 className="text-xs md:text-sm font-bold text-orange-800 uppercase mb-1">Infecciosos (TORCH + Zika)</h4>
                      <p className="text-sm text-orange-900/80">Citomegalovirus (Microcefalia, calcificaciones), Rubeola (Cardiopatías, cataratas, sordera), Zika (Microcefalia severa).</p>
                    </div>
                    <div className="p-4 bg-red-50 rounded-lg border border-red-100 break-words">
                      <h4 className="text-xs md:text-sm font-bold text-red-800 uppercase mb-1">Fármacos y Drogas</h4>
                      <p className="text-sm text-red-900/80">Ácido Valproico (Defectos del tubo neural), Talidomida (Focomelia), Alcohol (Facies característica, SAF).</p>
                    </div>
                    <div className="p-4 bg-blue-50 rounded-lg border border-blue-100 break-words">
                      <h4 className="text-xs md:text-sm font-bold text-blue-800 uppercase mb-1">Metabolismo Materno</h4>
                      <p className="text-sm text-blue-900/80">Diabetes Pregestacional mal controlada (Síndrome de regresión caudal, hipertrofia septal cardiaca asimétrica).</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-gradient-to-r from-amber-100 to-yellow-50 p-5 md:p-6 rounded-2xl border border-amber-200 shadow-sm break-words">
                <h3 className="text-amber-900 text-base md:text-lg font-bold mb-3 flex items-center gap-2"><Calendar className="shrink-0" /> Períodos Críticos (Perla Embriológica)</h3>
                <p className="text-amber-900/80 text-sm md:text-base leading-relaxed">
                  La vulnerabilidad máxima a la dismorfogénesis ocurre durante el <strong>período embrionario (semanas 3 a 8)</strong>. Durante esta ventana, las células están en rápida diferenciación (organogénesis). Una exposición teratogénica aquí causa defectos anatómicos <em>mayores</em>. Exámenes en el período fetal (semana 9 en adelante) suelen generar defectos anatómicos <em>menores</em> o alteraciones funcionales.
                </p>
              </div>
            </div>
          );
        }

        function Diagnostico() {
          return (
            <div className="space-y-6 md:space-y-8 animate-in slide-in-from-bottom-4 duration-500">
              <div className="border-b border-slate-300 pb-4">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800">Línea de Tiempo del Diagnóstico</h2>
                <p className="text-slate-500 mt-2 text-sm md:text-base">Del cribado prenatal no invasivo a la evaluación neonatal.</p>
              </div>
              
              <div className="relative pl-12 md:pl-0">
                <div className="md:hidden absolute left-4 top-4 bottom-4 w-1 bg-indigo-200 rounded-full"></div>
                
                <div className="space-y-8 md:space-y-12">
                  {/* Trimestre 1 */}
                  <div className="relative flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                    <div className="hidden md:flex flex-col items-center justify-center w-32 shrink-0">
                      <div className="h-16 w-1 bg-indigo-200 rounded-t-full"></div>
                      <div className="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200 z-10 shrink-0">1T</div>
                      <div className="h-16 w-1 bg-indigo-200 rounded-b-full"></div>
                    </div>
                    <div className="md:hidden absolute -left-12 top-4 w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md border-4 border-slate-50 z-10 shrink-0">1T</div>
                    
                    <div className="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 flex-1 w-full break-words">
                      <h3 className="text-lg md:text-xl font-bold text-indigo-700 mb-2">Semanas 11 - 14 (Cribado)</h3>
                      <ul className="space-y-4 mt-4">
                        <li className="flex items-start gap-3">
                          <div className="mt-1 bg-indigo-100 p-1.5 rounded-md shrink-0"><Activity size={16} className="text-indigo-600"/></div>
                          <div>
                            <strong className="block text-slate-800 text-sm md:text-base">Ecografía Marcadora:</strong>
                            <span className="text-xs md:text-sm text-slate-600">Medición de Translucencia Nucal, Hueso Nasal, flujo del Ductus Venoso.</span>
                          </div>
                        </li>
                        <li className="flex items-start gap-3">
                          <div className="mt-1 bg-purple-100 p-1.5 rounded-md shrink-0"><Syringe size={16} className="text-purple-600"/></div>
                          <div>
                            <strong className="block text-slate-800 text-sm md:text-base">NIPT (Test Prenatal No Invasivo):</strong>
                            <span className="text-xs md:text-sm text-slate-600">ADN fetal libre en sangre materna. Sensibilidad &gt;99% para Trisomías 21, 18, 13.</span>
                          </div>
                        </li>
                      </ul>
                    </div>
                  </div>

                  {/* Trimestre 2 */}
                  <div className="relative flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                    <div className="hidden md:flex flex-col items-center justify-center w-32 shrink-0">
                      <div className="h-16 w-1 bg-indigo-200 rounded-t-full"></div>
                      <div className="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-teal-200 z-10 shrink-0">2T</div>
                      <div className="h-16 w-1 bg-indigo-200 rounded-b-full"></div>
                    </div>
                    <div className="md:hidden absolute -left-12 top-4 w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md border-4 border-slate-50 z-10 shrink-0">2T</div>

                    <div className="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 flex-1 w-full break-words">
                      <h3 className="text-lg md:text-xl font-bold text-teal-700 mb-2">Semanas 15 - 22 (Diagnóstico)</h3>
                      <ul className="space-y-4 mt-4">
                        <li className="flex items-start gap-3">
                          <div className="mt-1 bg-teal-100 p-1.5 rounded-md shrink-0"><Syringe size={16} className="text-teal-600"/></div>
                          <div>
                            <strong className="block text-slate-800 text-sm md:text-base">Amniocentesis / Vellosidades Coriales:</strong>
                            <span className="text-xs md:text-sm text-slate-600">Estudio directo de ADN. Riesgo de pérdida ~0.5%. Permite Exoma o Microarrays.</span>
                          </div>
                        </li>
                        <li className="flex items-start gap-3">
                          <div className="mt-1 bg-sky-100 p-1.5 rounded-md shrink-0"><Activity size={16} className="text-sky-600"/></div>
                          <div>
                            <strong className="block text-slate-800 text-sm md:text-base">Ecografía Morfológica (Sem 20-22):</strong>
                            <span className="text-xs md:text-sm text-slate-600">Evaluación anatómica detallada de todos los órganos (corazón fetal, cerebro, etc.).</span>
                          </div>
                        </li>
                      </ul>
                    </div>
                  </div>

                  {/* Posnatal */}
                  <div className="relative flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                    <div className="hidden md:flex flex-col items-center justify-center w-32 shrink-0">
                      <div className="h-16 w-1 bg-indigo-200 rounded-t-full"></div>
                      <div className="w-12 h-12 bg-rose-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-rose-200 z-10 shrink-0"><Baby size={24}/></div>
                      <div className="h-16 w-1 bg-transparent rounded-b-full"></div>
                    </div>
                    <div className="md:hidden absolute -left-12 top-4 w-10 h-10 bg-rose-500 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md border-4 border-slate-50 z-10 shrink-0"><Baby size={20}/></div>

                    <div className="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 flex-1 w-full break-words">
                      <h3 className="text-lg md:text-xl font-bold text-rose-700 mb-2">Nacimiento (Examen Físico)</h3>
                      <div className="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-lg mt-4 text-xs md:text-sm text-rose-900 leading-relaxed">
                        <strong className="block mb-1">Regla Clínica Dismorfológica:</strong> La presencia de 3 o más anomalías <em>menores</em> (ej. clinodactilia + apéndice preauricular + pliegue simiesco) aumenta al 90% la probabilidad de encontrar una anomalía <em>mayor</em> oculta.
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const LungsIcon = ({ className, size }) => (
           <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20c-2.34-1.46-4.52-3.23-5.32-5.74A5.5 5.5 0 0 1 10.3 8a3.14 3.14 0 0 0 .7.12h.01a4 4 0 0 1 2.99-2h.01c1.55 0 2.92.93 3.59 2.3A5.5 5.5 0 0 1 20 15c0 2.13-1.8 3.57-3 4.5l-2.09 1.62c-.68.52-1.63.38-2.14-.3L11 20Zm0 0-1.8-1.5c-1.3-1.1-2.2-2-2.2-3.5a3 3 0 0 1 3-3c1.5 0 2.8.8 3.5 2"/></svg>
        );

        function MedicalIllustration({ id }) {
          switch (id) {
            case 'neuro':
              return (
                <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-sm p-4">
                  <rect width="200" height="200" rx="16" fill="#f8fafc" />
                  <path d="M 80 30 C 80 30, 100 110, 80 180" stroke="#cbd5e1" strokeWidth="8" fill="none" strokeLinecap="round"/>
                  <path d="M 90 40 L 110 40 M 90 70 L 110 70 M 90 100 L 110 100 M 90 130 L 110 130" stroke="#94a3b8" strokeWidth="12" strokeLinecap="round"/>
                  <circle cx="120" cy="160" r="25" fill="#fecaca" stroke="#ef4444" strokeWidth="4" />
                  <path d="M 80 145 C 110 145, 125 175, 80 175" fill="#f87171" opacity="0.6"/>
                  <text x="110" y="110" fontSize="12" fill="#ef4444" fontWeight="bold">Mielomeningocele</text>
                  <line x1="120" y1="115" x2="120" y2="135" stroke="#ef4444" strokeWidth="2" strokeDasharray="2 2" />
                </svg>
              );
            case 'cardio':
              return (
                <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-sm p-4">
                  <rect width="200" height="200" rx="16" fill="#f8fafc" />
                  <path d="M 100 170 C 100 170, 30 100, 40 50 C 45 25, 85 25, 100 55 C 115 25, 155 25, 160 50 C 170 100, 100 170, 100 170 Z" fill="#fee2e2" stroke="#ef4444" strokeWidth="6" strokeLinejoin="round"/>
                  <line x1="100" y1="55" x2="100" y2="90" stroke="#ef4444" strokeWidth="8" strokeLinecap="round" />
                  <line x1="100" y1="130" x2="100" y2="170" stroke="#ef4444" strokeWidth="8" strokeLinecap="round" />
                  <circle cx="100" cy="110" r="20" fill="#8b5cf6" opacity="0.6" />
                  <path d="M 100 170 C 65 135, 40 100, 40 50" fill="none" stroke="#b91c1c" strokeWidth="14" strokeLinecap="round"/>
                  <text x="125" y="115" fontSize="12" fill="#4338ca" fontWeight="bold">CIV (Mezcla)</text>
                  <text x="15" y="130" fontSize="11" fill="#b91c1c" fontWeight="bold">Hipertrofia</text>
                  <text x="35" y="145" fontSize="11" fill="#b91c1c" fontWeight="bold">del VD</text>

        function MedicalImage({ src, alt, id, mode }) {
          const [imgStatus, setImgStatus] = useState('loading'); 

          useEffect(() => {
            setImgStatus('loading');
          }, [src]);

          if (mode === 'esquema') {
            return (
              <div className="w-full h-full bg-white rounded-xl overflow-hidden shadow-inner border border-slate-200">
                <MedicalIllustration id={id} />
              </div>
            );
          }

          return (
            <div className="w-full h-full relative flex flex-col items-center justify-center bg-white rounded-xl overflow-hidden shadow-inner border border-slate-200">
              {imgStatus === 'error' ? (
                <>
                  <div className="absolute top-3 right-3 bg-amber-100 text-amber-800 text-[10px] px-2 py-1 rounded-md border border-amber-200 z-20 flex items-center gap-1 shadow-sm">
                    <ShieldAlert size={12} /> Esquema (Foto Bloqueada por Red)
                  </div>
                  <MedicalIllustration id={id} />
                </>
              ) : (
                <>
                  {imgStatus === 'loading' && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-10">
                      <div className="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                      <span className="text-xs text-slate-400 font-medium">Conectando con base de imágenes...</span>
                    </div>
                  )}
                  <a href={src} target="_blank" rel="noreferrer" className="w-full h-full flex items-center justify-center cursor-zoom-in group p-2" title="Clic para ampliar original">
                    <img
                      src={src}
                      alt={alt}
                      className={`w-full h-full object-contain transition-opacity duration-300 ${imgStatus === 'loading' ? 'opacity-0' : 'opacity-100'} group-hover:scale-105`}
                      onLoad={() => setImgStatus('success')}
                      onError={() => setImgStatus('error')}
                      crossOrigin="anonymous"
                    />
                  </a>
                </>
              )}
            </div>
          );
        }

        function Patologias() {
          const [selectedPathology, setSelectedPathology] = useState(0);
          const [filter, setFilter] = useState('Todas');
          const [imageMode, setImageMode] = useState('foto');

          const pathologies = [
            {
              id: "neuro",
              title: "Defectos del Tubo Neural",
              system: "Neurológico",
              icon: <Brain className="text-purple-500" size={32} />,
              color: "purple",
              imageUrl: "https://www.cdc.gov/birth-defects/media/images/2024/04/spinabif_1200x675.jpg?_=86182",
              basic: "Falla en el cierre del neuroporo craneal (anencefalia) o caudal (espina bífida) entre los días 26-28. Prevenible con suplementación de Ácido Fólico.",
              clinical: "Mielomeningocele (MM): Protrusión de meninges y médula. Produce paraplejía, vejiga neurogénica e hidrocefalia (Malformación de Chiari II).",

            {

              title: "Cardiopatías Congénitas",

              imageUrl: "https://lh5.googleusercontent.com/proxy/Dwq3eCYSybZfME5zkIWS_FOp1KjcBHVqRf0aexckP28GD2ChJEGcR8zSCinIwipPpSkjkgVupUS80DL_zafXQcy_WAuXgkmAlHe87A90NnqoJawmzCsplMUr8magMRKahMRtava21eHojQ",

            {

              basic: "No es una luxación congénita abrupta, sino un proceso de deformidad evolutiva de la cavidad acetabular y cabeza femoral. Mayor riesgo en niñas podálicas.",
              clinical: "Signos: Ortolani (reduce), Barlow (luxa), Galeazzi (asimetría).",

              icon: <Baby className="text-blue-500" size={32} />,

              imageUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBBtk_CCxoBGjIgxVV_gr4Nweh0jrA7DhuPw&s",
              basic: "Labio: Falla fusión de prominencias maxilares con nasales mediales. Paladar: Falla fusión crestas palatinas. Pueden aislarse o asociarse a síndromes.",

              treatment: "Queiloplastia (labio) a los 3-6 meses (Regla de los 10: 10 sem, 10 lbs, 10g Hb). Palatoplastia 9-18 meses antes del desarrollo del habla."
            },
            {
              id: "down",
              title: "Síndrome de Down (Trisomía 21)",
              system: "Xenético/Cromosómico",
              icon: <Dna className="text-emerald-500" size={32} />,
              color: "emerald",
              imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/21_trisomy_-_Down_syndrome.png/250px-21_trisomy_-_Down_syndrome.png",
              basic: "O 95% é por non disxunción meiótica materna. O risco aumenta coa idade materna (>35 anos).",
              clinical: "Hipotonia, fisuras palpebrais oblicuas, macroglosia, prego palmar transverso. O 50% teñen cardiopatías (Canle AV común é típico).",

            {

              color: "cyan",
              imageUrl: "https://www.cdc.gov/birth-defects/media/images/diaphragmatichernia_1.png",

              treatment: "Intubación inmediata (¡NUNCA ventilar con bolsa-mascarilla porque infla estómago y comprime pulmón!). Cirugía diferida tras estabilización."
            }
          ];

          const filteredPathologies = filter === 'Todas' ? pathologies : pathologies.filter(p => p.system.includes(filter) || p.system === 'Genético/Cromosómico');
          const activePath = pathologies[selectedPathology];

          const getColorClasses = (color) => {
            const map = {
              purple: 'bg-purple-100 text-purple-800 border-purple-200',
              rose: 'bg-rose-100 text-rose-800 border-rose-200',
              slate: 'bg-slate-100 text-slate-800 border-slate-200',
              blue: 'bg-blue-100 text-blue-800 border-blue-200',
              emerald: 'bg-emerald-100 text-emerald-800 border-emerald-200',
              cyan: 'bg-cyan-100 text-cyan-800 border-cyan-200',

          return (
            <div className="space-y-6 md:space-y-8 animate-in fade-in duration-500 flex flex-col min-h-full">

                  {['Todas', 'Cardiovascular', 'Neurológico', 'Musculoesquelético'].map(sys => (
                     <button 
                      key={sys}
                      onClick={() => setFilter(sys)}
                      className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${filter === sys ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}
                     >
                       {sys}
                     </button>
                  ))}
                </div>
              </div>
              
              <div className="flex flex-col lg:flex-row gap-6 lg:gap-8 flex-1">

                <div className="lg:w-1/3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3 content-start">
                  {filteredPathologies.map((path, idx) => {
                    const originalIndex = pathologies.findIndex(p => p.title === path.title);
                    return (
                      <button
                        key={idx}
                        onClick={() => setSelectedPathology(originalIndex)}
                        className={`w-full flex items-center gap-3 md:gap-4 p-3 md:p-4 rounded-xl text-left transition-all duration-200 border-2 ${
                          selectedPathology === originalIndex 
                            ? 'bg-white border-indigo-600 shadow-md transform lg:scale-[1.02]' 
                            : 'bg-slate-50 hover:bg-white text-slate-600 border-transparent hover:border-slate-300'
                        }`}
                      >
                        <div className={`shrink-0 ${selectedPathology === originalIndex ? '' : 'opacity-70 grayscale'}`}>{path.icon}</div>
                        <div className="flex-1 min-w-0">
                          <span className={`block font-bold text-sm md:text-base leading-tight truncate ${selectedPathology === originalIndex ? 'text-indigo-900' : ''}`}>{path.title}</span>
                          <span className="text-[10px] text-slate-500 uppercase tracking-wider block mt-0.5">{path.system}</span>
                        </div>
                        <ArrowRight size={18} className={`ml-auto shrink-0 hidden sm:block ${selectedPathology === originalIndex ? 'text-indigo-600' : 'opacity-0'}`} />
                      </button>
                    )
                  })}
                  {filteredPathologies.length === 0 && <p className="text-sm text-slate-500 italic p-4">No hay patologías en esta categoría.</p>}
                </div>
                
                {/* Panel de Detalles */}
                <div className="lg:w-2/3">
                  <div className="bg-white p-5 md:p-8 rounded-2xl shadow-xl border border-slate-200 h-full animate-in slide-in-from-right-4 duration-300 relative overflow-hidden break-words">
                    <div className="absolute -right-8 -top-8 opacity-[0.03] scale-[3] md:scale-[4] pointer-events-none shrink-0">
                      {activePath.icon}
                    </div>

                    <div className="flex flex-col md:flex-row items-start md:items-center gap-4 mb-4 relative z-10">
                      <div className="flex items-center gap-4 flex-1">
                        <div className={`p-3 md:p-4 rounded-2xl ${getColorClasses(activePath.color)} bg-opacity-30 shrink-0`}>
                          {activePath.icon}
                        </div>
                        <div>
                          <h3 className="text-2xl md:text-3xl font-bold text-slate-800 leading-tight">
                            {activePath.title}
                          </h3>
                          <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mt-1 block">{activePath.system}</span>
                        </div>
                      </div>
                    </div>

                    {/* Selector Visual */}
                    <div className="flex justify-end mb-3 relative z-10">
                       <div className="bg-slate-100 p-1 rounded-lg inline-flex border border-slate-200">
                         <button 
                           onClick={() => setImageMode('esquema')} 
                           className={`px-3 py-1.5 text-xs font-bold rounded-md flex items-center gap-1.5 transition-all ${imageMode === 'esquema' ? 'bg-white shadow text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}
                         >
                           <PenTool size={14} /> Esquema Anatómico
                         </button>
                         <button 
                           onClick={() => setImageMode('foto')} 
                           className={`px-3 py-1.5 text-xs font-bold rounded-md flex items-center gap-1.5 transition-all ${imageMode === 'foto' ? 'bg-white shadow text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}
                         >
                           <ImageIcon size={14} /> Fotografía Médica (Requiere Internet)
                         </button>
                       </div>
                    </div>

                    {/* Contenedor Visual Inteligente */}
                    <div className="w-full h-64 md:h-80 mb-6 relative z-10">
                       <MedicalImage src={activePath.imageUrl} alt={activePath.title} id={activePath.id} mode={imageMode} />

                    <div className="space-y-4 md:space-y-6 relative z-10">
                      <div className="group">
                        <h4 className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                          <Microscope size={14} className="shrink-0"/> Ciencias Básicas (Embriología)
                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50 p-4 md:p-5 rounded-xl border border-slate-100 group-hover:bg-indigo-50/50 transition-colors">{activePath.basic}</p>
                      </div>
                      
                      <div className="group">
                        <h4 className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                          <Stethoscope size={14} className="shrink-0"/> Diagnóstico y Clínica
                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50 p-4 md:p-5 rounded-xl border border-slate-100 group-hover:bg-teal-50/50 transition-colors">{activePath.clinical}</p>
                      </div>
                      
                      <div className="group">
                        <h4 className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                          <Activity size={14} className="shrink-0"/> Manejo y Tratamiento
                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50 p-4 md:p-5 rounded-xl border border-slate-100 group-hover:bg-rose-50/50 transition-colors">{activePath.treatment}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function Simuladores() {
          const [activeSim, setActiveSim] = useState('silverman');

          return (
            <div className="space-y-6 md:space-y-8 animate-in slide-in-from-bottom-4 duration-500 overflow-hidden">
              <div className="border-b border-slate-300 pb-4">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <Calculator className="shrink-0"/> Simuladores Clínicos
                </h2>
                <p className="text-slate-500 mt-2 text-sm md:text-base">Herramientas para toma de decisiones en el internado y residencia.</p>
              </div>

              <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 md:mx-0 md:px-0">
                <button onClick={()=>setActiveSim('silverman')} className={`px-5 py-2 md:px-6 md:py-3 rounded-full font-bold text-xs md:text-sm transition-all whitespace-nowrap shrink-0 ${activeSim==='silverman' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>Silverman-Andersen</button>
                <button onClick={()=>setActiveSim('apgar')} className={`px-5 py-2 md:px-6 md:py-3 rounded-full font-bold text-xs md:text-sm transition-all whitespace-nowrap shrink-0 ${activeSim==='apgar' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>Test de APGAR</button>
                <button onClick={()=>setActiveSim('ddc')} className={`px-5 py-2 md:px-6 md:py-3 rounded-full font-bold text-xs md:text-sm transition-all whitespace-nowrap shrink-0 ${activeSim==='ddc' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>Riesgo DDC</button>
                <button onClick={()=>setActiveSim('acido')} className={`px-5 py-2 md:px-6 md:py-3 rounded-full font-bold text-xs md:text-sm transition-all whitespace-nowrap shrink-0 ${activeSim==='acido' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>Dosis Ácido Fólico</button>
              </div>

              <div className="bg-white p-5 md:p-8 rounded-2xl md:rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                {activeSim === 'silverman' && <SimuladorSilverman />}
                {activeSim === 'ddc' && <SimuladorDDC />}
                {activeSim === 'apgar' && <SimuladorAPGAR />}
                {activeSim === 'acido' && <SimuladorAcidoFolico />}
              </div>
            </div>
          );
        }

        function SimuladorSilverman() {
          const [scores, setScores] = useState({ disociacion: 0, retraccion: 0, tiraje: 0, aleteo: 0, quejido: 0 });

          const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);

          const getResult = (score) => {
            if (score === 0) return { label: "Sin Dificultad Respiratoria", color: "text-green-600", bg: "bg-green-100" };
            if (score <= 3) return { label: "Dificultad Respiratoria Leve", color: "text-amber-600", bg: "bg-amber-100" };
            if (score <= 6) return { label: "Dificultad Respiratoria Moderada", color: "text-orange-600", bg: "bg-orange-100" };
            return { label: "Dificultad Respiratoria Severa", color: "text-rose-600", bg: "bg-rose-100" };
          };

          const res = getResult(totalScore);

          const options = {
            disociacion: [{val: 0, label: "Sincronizado"}, {val: 1, label: "Retraso inspiratorio (Tórax inmovil, abdomen sube)"}, {val: 2, label: "Balanceo (Sube y baja alternado)"}],
            retraccion: [{val: 0, label: "Ausente"}, {val: 1, label: "Apenas visible"}, {val: 2, label: "Marcada"}],
            tiraje: [{val: 0, label: "Ausente"}, {val: 1, label: "Apenas visible"}, {val: 2, label: "Marcado"}],
            aleteo: [{val: 0, label: "Ausente"}, {val: 1, label: "Mínimo"}, {val: 2, label: "Marcado"}],
            quejido: [{val: 0, label: "Ausente"}, {val: 1, label: "Audible con estetoscopio"}, {val: 2, label: "Audible a distancia"}]
          };

          const labels = ["Disociación Tóraco-Abdominal", "Retracción Xifoidea", "Tiraje Intercostal", "Aleteo Nasal", "Quejido Espiratorio"];

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-10">
              <div className="w-full">
                <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-2">Test de Silverman-Andersen</h3>
                <p className="text-sm text-slate-500 mb-4 md:mb-6">Evalúa la dificultad respiratoria en neonatos (A diferencia del APGAR, a mayor puntaje, peor estado).</p>
                <div className="space-y-4 md:space-y-4">
                  {Object.keys(options).map((key, idx) => (
                    <div key={key} className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                      <p className="font-bold text-sm text-slate-700 mb-2 truncate">{labels[idx]}</p>
                      <select 
                        className="w-full p-2 text-sm rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 bg-white"
                        value={scores[key]}
                        onChange={(e) => setScores({...scores, [key]: parseInt(e.target.value)})}
                      >
                        {options[key].map(opt => <option key={opt.val} value={opt.val}>{opt.label} ({opt.val} pts)</option>)}
                      </select>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="flex flex-col justify-center items-center p-6 md:p-8 bg-slate-900 rounded-2xl text-white shadow-inner break-words">
                <p className="text-slate-400 font-bold text-xs md:text-sm tracking-widest uppercase mb-2 md:mb-4 text-center">Puntuación Total</p>
                <div className="text-6xl md:text-8xl font-black mb-4 md:mb-6 leading-none">{totalScore}</div>
                <div className={`px-4 py-2 md:px-6 md:py-2 rounded-full font-bold text-sm md:text-lg ${res.bg} ${res.color} mb-6 text-center leading-tight`}>
                  {res.label}
                </div>
                <div className="bg-slate-800 p-4 md:p-5 rounded-xl w-full text-center">
                  <strong className="text-white block mb-1 text-sm">Clave Mnemotécnica (DIRE TIA QUE)</strong>
                  <p className="text-xs text-slate-400"><strong>DI</strong>sociación, <strong>RE</strong>tracción, <strong>TI</strong>raje, <strong>A</strong>leteo, <strong>QUE</strong>jido.</p>
                </div>
              </div>
            </div>
          );
        }

        function SimuladorAPGAR() {
          const [scores, setScores] = useState({ a: 0, p: 0, g: 0, a2: 0, r: 0 });
          const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
          const getResult = (score) => {
            if (score >= 7) return { label: "Vigoroso (Normal)", color: "text-green-600", bg: "bg-green-100" };
            if (score >= 4) return { label: "Depresión Moderada", color: "text-amber-600", bg: "bg-amber-100" };
            return { label: "Depresión Severa", color: "text-rose-600", bg: "bg-rose-100" };
          };
          const res = getResult(totalScore);

          const options = {
            a: [{val: 0, label: "Cianosis generalizada o palidez"}, {val: 1, label: "Acrocianosis (cuerpo rosado, extremidades azules)"}, {val: 2, label: "Completamente rosado"}],
            p: [{val: 0, label: "Ausente"}, {val: 1, label: "< 100 latidos por minuto"}, {val: 2, label: "> 100 latidos por minuto"}],
            g: [{val: 0, label: "Sin respuesta"}, {val: 1, label: "Mueca leve / llanto débil"}, {val: 2, label: "Llanto vigoroso al estímulo"}],
            a2: [{val: 0, label: "Flácido"}, {val: 1, label: "Cierta flexión de extremidades"}, {val: 2, label: "Movimientos activos"}],
            r: [{val: 0, label: "Ausente"}, {val: 1, label: "Lento, irregular"}, {val: 2, label: "Bueno, llanto fuerte"}]
          };

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-10">
              <div className="w-full">
                <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-4 md:mb-6">Test de APGAR</h3>
                <div className="space-y-4 md:space-y-5">
                  {Object.keys(options).map((key, idx) => (
                    <div key={key} className="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                      <p className="font-bold text-sm md:text-base text-slate-700 mb-2 truncate">
                        {['Apariencia (Color)', 'Pulso (Frec. Cardiaca)', 'Gesticulación (Reflejos)', 'Actividad (Tono)', 'Respiración (Esfuerzo)'][idx]}
                      </p>
                      <select 
                        className="w-full p-2 text-sm md:text-base rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 bg-white"
                        value={scores[key]}
                        onChange={(e) => setScores({...scores, [key]: parseInt(e.target.value)})}
                      >
                        {options[key].map(opt => <option key={opt.val} value={opt.val}>{opt.label} ({opt.val} pts)</option>)}
                      </select>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="flex flex-col justify-center items-center p-6 md:p-8 bg-slate-900 rounded-2xl text-white shadow-inner break-words">
                <p className="text-slate-400 font-bold text-xs md:text-sm tracking-widest uppercase mb-2 md:mb-4 text-center">Puntuación Total</p>
                <div className="text-6xl md:text-8xl font-black mb-4 md:mb-6 leading-none">{totalScore}</div>
                <div className={`px-4 py-2 md:px-6 md:py-2 rounded-full font-bold text-sm md:text-lg ${res.bg} ${res.color} mb-6 text-center leading-tight`}>{res.label}</div>
              </div>
            </div>
          );
        }

        function SimuladorDDC() {
          const [factors, setFactors] = useState({ female: false, breech: false, family: false, oligo: false });
          let score = (factors.female ? 1 : 0) + (factors.breech ? 3 : 0) + (factors.family ? 2 : 0) + (factors.oligo ? 1 : 0);
          const getRec = () => {
            if (score === 0) return { l: "Riesgo Bajo", d: "Examen físico pediátrico de rutina.", c: "bg-green-500", textC: "text-green-600" };
            if (score <= 2) return { l: "Riesgo Moderado", d: "Ecografía a las 4-6 semanas si examen es dudoso.", c: "bg-amber-500", textC: "text-amber-600" };
            return { l: "Alto Riesgo", d: "Ecografía obligatoria a las 4-6 sem. Derivar a Ortopedia.", c: "bg-rose-500", textC: "text-rose-600" };
          };
          const rec = getRec();
          const toggle = (k) => setFactors({...factors, [k]: !factors[k]});

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-10">
              <div>
                <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-4 md:mb-6">Riesgo Displasia de Cadera</h3>
                <p className="text-sm md:text-base text-slate-500 mb-4 md:mb-6">Seleccione los factores presentes al nacimiento:</p>
                <div className="space-y-3">
                  {[
                    { id: 'female', label: 'Sexo Femenino', desc: 'Mayor laxitud ligamentaria por estrógenos maternos.' },
                    { id: 'breech', label: 'Presentación Podálica', desc: 'Alta compresión mecánica en 3er trimestre.' },
                    { id: 'family', label: 'Historia Familiar', desc: 'Padres o hermanos con DDC.' },
                    { id: 'oligo', label: 'Oligohidramnios', desc: 'Asociado a deformaciones por moldeo.' }
                  ].map(f => (
                    <div key={f.id} onClick={()=>toggle(f.id)} className={`cursor-pointer border-2 p-3 md:p-4 rounded-xl flex items-center gap-3 transition-all ${factors[f.id] ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                      <div className={`w-5 h-5 rounded-full flex items-center justify-center border-2 shrink-0 ${factors[f.id] ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300'}`}>
                        {factors[f.id] && <div className="w-2 h-2 bg-white rounded-full"></div>}
                      </div>
                      <div className="flex-1 break-words">
                        <p className={`font-bold text-sm md:text-base leading-tight mb-0.5 ${factors[f.id] ? 'text-indigo-900' : 'text-slate-700'}`}>{f.label}</p>
                        <p className="text-[11px] md:text-xs text-slate-500 leading-snug">{f.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="flex flex-col justify-center p-6 md:p-8 bg-slate-50 rounded-2xl border border-slate-200 break-words">
                <h4 className="text-base font-bold text-slate-500 uppercase tracking-wide mb-4 text-center lg:text-left">Directriz Clínica</h4>
                <div className={`h-2 w-full rounded-full bg-slate-200 overflow-hidden mb-4`}><div className={`h-full ${rec.c} transition-all duration-500`} style={{width: `${Math.min(100, (score/4)*100)}%`}}></div></div>
                <h3 className={`text-3xl font-black mb-3 ${rec.textC} text-center lg:text-left leading-tight`}>{rec.l}</h3>
                <p className="text-slate-700 text-sm md:text-lg mb-6 text-center lg:text-left">{rec.d}</p>
              </div>
            </div>
          );
        }

        function SimuladorAcidoFolico() {
          const [factors, setFactors] = useState({ ant: false, db: false, epi: false, imc: false });
          const isHighRisk = factors.ant || factors.db || factors.epi || factors.imc;
          const toggle = (k) => setFactors({...factors, [k]: !factors[k]});

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-10">
              <div>
                <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-4 md:mb-6">Dosis de Ácido Fólico</h3>
                <p className="text-sm md:text-base text-slate-500 mb-4">Cálculo de dosis preconcepcional basándose en riesgo materno:</p>
                <div className="space-y-3">
                  {[
                    { id: 'ant', label: 'Antecedente previo', desc: 'Feto anterior con Espina Bífida o Anencefalia.' },
                    { id: 'db', label: 'Diabetes Pregestacional', desc: 'Diabetes tipo 1 o 2.' },
                    { id: 'epi', label: 'Uso Anticonvulsivantes', desc: 'Especialmente Ácido Valproico.' },
                    { id: 'imc', label: 'Obesidad Severa', desc: 'IMC > 35.' }
                  ].map(f => (
                    <div key={f.id} onClick={()=>toggle(f.id)} className={`cursor-pointer border-2 p-3 md:p-4 rounded-xl flex items-center gap-3 transition-all ${factors[f.id] ? 'border-rose-600 bg-rose-50' : 'border-slate-200 bg-white'}`}>
                      <div className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ${factors[f.id] ? 'border-rose-600 bg-rose-600' : 'border-slate-300'}`}>
                        {factors[f.id] && <span className="text-white text-xs font-bold">✓</span>}
                      </div>
                      <div className="flex-1 break-words">
                        <p className={`font-bold text-sm md:text-base leading-tight mb-0.5 ${factors[f.id] ? 'text-rose-900' : 'text-slate-700'}`}>{f.label}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="flex flex-col justify-center items-center text-center p-6 bg-emerald-50 rounded-2xl border border-emerald-200">
                <h4 className="text-emerald-800 font-bold text-sm uppercase mb-6">Prescripción Recomendada</h4>
                {isHighRisk ? (
                  <div className="animate-in zoom-in duration-300 flex flex-col items-center">
                    <div className="text-5xl md:text-7xl font-black text-emerald-700 mb-3">4 - 5 <span className="text-2xl">mg</span></div>
                    <p className="font-bold text-xs md:text-sm text-emerald-900 bg-emerald-200 px-4 py-1.5 rounded-full">Dosis de Alto Riesgo</p>
                  </div>
                ) : (
                  <div className="animate-in zoom-in duration-300 flex flex-col items-center">
                    <div className="text-5xl md:text-7xl font-black text-emerald-700 mb-3">400 <span className="text-2xl">mcg</span></div>
                    <p className="font-bold text-xs md:text-sm text-emerald-900 bg-emerald-200 px-4 py-1.5 rounded-full">Dosis Estándar (Bajo Riesgo)</p>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function CasosClinicos() {
          const [currentCase, setCurrentCase] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);

          const cases = [
            {
              question: "Recién nacido de 1 hora de vida, producto de madre diabética pregestacional mal controlada. Presenta cianosis central que no revierte tras la prueba de hiperoxia (O2 al 100% por 10 min). ¿Cuál es la sospecha diagnóstica más probable y la medida terapéutica inicial urgente?",
              options: [
                "Enfermedad de membrana hialina; administrar surfactante.",
                "Cardiopatía congénita cianótica (ej. Transposición Grandes Vasos); iniciar Prostaglandina E1 (Alprostadil) IV.",
                "Cierre prematuro del ductus arterioso; administrar Indometacina.",
                "Hernia diafragmática congénita; ventilar con bolsa-mascarilla."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! Una cianosis que no responde a la prueba de hiperoxia indica un cortocircuito derecha-izquierda (origen cardíaco, no pulmonar). En recién nacidos de madres diabéticas hay mayor riesgo de cardiopatías (como TGV). Es vital iniciar Prostaglandinas (PGE1) para mantener el ductus arterioso permeable y asegurar la mezcla de sangre hasta la cirugía."
            },
            {
              question: "En la evaluación de una niña recién nacida, nacida en presentación podálica, se realiza una maniobra de abducción y tracción de la cadera izquierda, sintiendo un 'cloc' palpable de entrada de la cabeza femoral al acetábulo. Este signo se conoce como:",
              options: [
                "Signo de Galeazzi.",
                "Maniobra de Barlow (positiva).",
                "Maniobra de Ortolani (positiva).",
                "Signo del pliegue asimétrico."
              ],
              correctAnswer: 2,
              explanation: "¡Correcto! La maniobra de Ortolani 'O' de 'Open' (abrir/abducción) busca RE-DUCIR una cadera que ya estaba luxada en reposo. Al entrar al acetábulo se siente el chasquido o 'cloc'. La maniobra de Barlow busca LUXAR una cadera inestable (se empuja hacia atrás)."
            },
            {
              question: "Mujer de 38 años en su semana 12 de gestación. La ecografía reporta una translucencia nucal severamente aumentada y ausencia de hueso nasal. ¿Cuál es el siguiente paso diagnóstico más apropiado dado el alto riesgo?",
              options: [
                "Tranquilizar a la madre y repetir ecografía en 4 semanas.",
                "Biopsia de vellosidades coriales o NIPT (ADN fetal libre) para estudio genético.",
                "Amniocentesis inmediata.",
                "Programar cirugía fetal por sospecha de defecto del tubo neural."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! La TN aumentada y ausencia de hueso nasal son marcadores ecográficos muy fuertes de cromosomopatías (como Trisomía 21). El paso a seguir es ofrecer un Test de ADN fetal en sangre materna (NIPT) como cribado de altísima sensibilidad o directamente una Biopsia de Vellosidades Coriales para confirmación diagnóstica (la amniocentesis no se realiza antes de la semana 15)."
            },
            {
              question: "Se recibe a un recién nacido en la sala de partos que presenta un abdomen excavado (escafoide), dificultad respiratoria severa y ruidos hidroaéreos audibles en el hemitórax izquierdo. ¿Qué acción está absolutamente CONTRAINDICADA en el manejo inicial de este paciente?",
              options: [
                "Intubación endotraqueal inmediata.",
                "Colocación de sonda orogástrica para descompresión.",
                "Ventilación con bolsa-mascarilla (ambú).",
                "Monitorización continua de saturación de oxígeno preductal."
              ],
              correctAnswer: 2,
              explanation: "¡Correcto! La presentación clínica es clásica de una Hernia Diafragmática Congénita. La ventilación a presión positiva con bolsa-mascarilla está contraindicada porque el aire ingresa al estómago e intestinos (alojados en el tórax), distendiéndolos y comprimiendo aún más el pulmón hipoplásico. El paciente debe ser intubado inmediatamente."
            },
            {
              question: "Un feto es diagnosticado con mielomeningocele lumbosacro a las 20 semanas de gestación. Los padres preguntan sobre el beneficio de la cirugía fetal intrauterina frente a esperar para operar después del nacimiento. Según la evidencia actual (Estudio MOMS), usted les explica que la cirugía fetal:",
              options: [
                "Cura completamente la enfermedad y garantiza una función motora normal al 100%.",
                "Reduce significativamente la necesidad de derivación ventrículo-peritoneal para la hidrocefalia y mejora los resultados motores.",
                "Solo tiene propósitos estéticos y no afecta el desarrollo neurológico a largo plazo del paciente.",
                "Aumenta la tasa de mortalidad fetal severamente pero reduce el riesgo de rotura uterina."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! El célebre ensayo clínico MOMS (Management of Myelomeningocele Study) demostró que la reparación prenatal, comparada con la posnatal, revierte parcialmente la malformación de Chiari II, reduciendo a la mitad la necesidad de colocar una válvula de derivación (shunt) y mejorando sustancialmente la capacidad del niño para caminar de forma independiente."
            }
          ];

          const handleAnswer = (index) => {
            if (isAnswered) return;
            setSelectedAnswer(index);
            setIsAnswered(true);
          };

          const nextCase = () => {
            setCurrentCase((prev) => (prev + 1) % cases.length);
            setSelectedAnswer(null);
            setIsAnswered(false);
          };

          const cCase = cases[currentCase];

          return (
            <div className="space-y-6 md:space-y-8 animate-in slide-in-from-bottom-4 duration-500 overflow-hidden">
              <div className="border-b border-slate-300 pb-4">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <HelpCircle className="text-indigo-600 shrink-0"/> Casos Clínicos (Quiz)
                </h2>
                <p className="text-slate-500 mt-2 text-sm md:text-base">Evalúa tus conocimientos integrando embriología y clínica.</p>
              </div>

              <div className="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl shadow-xl border border-slate-200">
                <div className="flex justify-between items-center mb-6">
                  <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Caso {currentCase + 1} de {cases.length}</span>
                  <div className="flex gap-1">
                    {cases.map((_, i) => (
                      <div key={i} className={`h-2 w-8 rounded-full ${i === currentCase ? 'bg-indigo-600' : 'bg-slate-200'}`}></div>
                    ))}
                  </div>
                </div>

                <p className="text-lg md:text-xl font-medium text-slate-800 mb-8 leading-relaxed">
                  {cCase.question}
                </p>

                <div className="space-y-3">
                  {cCase.options.map((opt, idx) => {
                    let btnClass = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-indigo-50 hover:border-indigo-300";
                    let Icon = null;

                    if (isAnswered) {
                      if (idx === cCase.correctAnswer) {
                        btnClass = "bg-green-100 border-green-500 text-green-900 shadow-md transform scale-[1.01]";
                        Icon = <CheckCircle2 className="text-green-600 shrink-0" />;
                      } else if (idx === selectedAnswer) {
                        btnClass = "bg-rose-50 border-rose-500 text-rose-900 opacity-70";
                        Icon = <XCircle className="text-rose-500 shrink-0" />;
                      } else {
                        btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => handleAnswer(idx)}
                        disabled={isAnswered}
                        className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-300 flex items-center gap-4 ${btnClass}`}
                      >
                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 ${isAnswered ? 'border-transparent' : 'border-slate-300'}`}>
                          {!isAnswered && <span className="text-xs font-bold text-slate-400">{['A','B','C','D'][idx]}</span>}
                          {Icon}
                        </div>
                        <span className="text-sm md:text-base leading-snug">{opt}</span>
                      </button>
                    )
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-8 animate-in slide-in-from-top-4 duration-300">
                    <div className={`p-5 rounded-xl border-l-4 ${selectedAnswer === cCase.correctAnswer ? 'bg-green-50 border-green-500' : 'bg-amber-50 border-amber-500'}`}>
                      <h4 className={`font-bold text-sm uppercase tracking-wider mb-2 ${selectedAnswer === cCase.correctAnswer ? 'text-green-800' : 'text-amber-800'}`}>
                        {selectedAnswer === cCase.correctAnswer ? '¡Respuesta Correcta!' : 'Retroalimentación Clínica'}
                      </h4>
                      <p className="text-slate-700 text-sm md:text-base leading-relaxed">
                        {cCase.explanation}
                      </p>
                    </div>
                    
                    <button 
                      onClick={nextCase}
                      className="mt-6 w-full md:w-auto px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg flex items-center justify-center gap-2"
                    >
                      Siguiente Caso <ArrowRight size={18} />
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function NavItem({ icon, label, active, onClick }) {
          return (
            <button 
              onClick={onClick}
              className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl transition-all ${
                active 
                  ? 'bg-indigo-600 text-white shadow-md' 
                  : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'
              }`}
            >
              <div className="shrink-0">{icon}</div>
              <span className="truncate">{label}</span>
            </button>
          );
        }

        function ProgressBar({ label, percent, colorClass, textClass }) {
          return (
            <div className="relative pt-1">
              <div className="flex mb-2 items-center justify-between gap-4">
                <span className={`text-xs md:text-sm font-semibold inline-block truncate ${textClass}`}>{label}</span>
                <span className={`text-xs md:text-sm font-bold inline-block shrink-0 ${textClass}`}>{percent}%</span>
              </div>
              <div className={`overflow-hidden h-2 md:h-2.5 mb-4 text-xs flex rounded-full ${colorClass.replace('bg-', 'bg-').replace('500', '100').replace('400', '100')}`}>
                <div style={{ width: `${percent}%` }} className={`shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center ${colorClass} transition-all duration-1000`}></div>
              </div>
            </div>
          );
        }

        function InfoCard({ title, icon, children }) {
          return (
            <div className="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 hover:shadow-lg transition-shadow break-words h-full flex flex-col">
              <div className="flex items-center gap-3 mb-3 md:mb-4">
                <div className="p-2 bg-slate-50 rounded-lg shrink-0">{icon}</div>
                <h3 className="font-bold text-base md:text-lg text-slate-800 leading-tight">{title}</h3>
              </div>
              <p className="text-slate-600 text-xs md:text-sm leading-relaxed flex-1">
                {children}
              </p>
            </div>
          );
        }

        function DefItem({ term, def, type }) {
          return (
            <div className="p-4 md:p-5 bg-slate-50 rounded-xl border border-slate-200 hover:border-indigo-300 transition-colors break-words h-full flex flex-col">
              <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2 mb-2 md:mb-3">
                <span className="font-black text-base md:text-lg text-indigo-900 leading-tight">{term}</span>
                <span className="text-[9px] md:text-[10px] font-bold uppercase tracking-wider bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full self-start shrink-0">{type}</span>
              </div>
              <p className="text-xs md:text-sm text-slate-600 leading-relaxed flex-1">{def}</p>
            </div>
          );
        }

        // --- INICIALIZACIÓN DE REACT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
