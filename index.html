<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenoClínica - Malformaciones Congénitas</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Ocultar barra de desplazamiento manteniendo funcionalidad */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones suaves globales y balanceo de texto */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        p, h1, h2, h3, h4, span { text-wrap: pretty; }
        
        /* Patrón de puntos para el fondo */
        .bg-dots {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-200 selection:text-indigo-900">
    
    <!-- Aquí es donde React "dibujará" la aplicación -->
    <div id="root"></div>

    <!-- Script principal de la aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SISTEMA DE ICONOS (Adaptación para HTML puro) ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = '';
                    let iconNode = lucide.icons[name];
                    
                    // Fallbacks para asegurar la compatibilidad
                    if (!iconNode && name === 'CircleHelp') iconNode = lucide.icons['HelpCircle'];
                    if (!iconNode && name === 'CircleCheckBig') iconNode = lucide.icons['CheckCircle2'];
                    if (!iconNode && name === 'CircleX') iconNode = lucide.icons['XCircle'];

                    if (iconNode) {
                        const svg = lucide.createElement(iconNode);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        spanRef.current.appendChild(svg);
                    } else {
                        // Icono de error visible si no se encuentra
                        spanRef.current.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="9" x2="15" y1="9" y2="15"></line><line x1="15" x2="9" y1="9" y2="15"></line></svg>`;
                    }
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        // Mapeo de iconos corregido (Debe ser estricto en mayúsculas para que el navegador los lea)
        const Activity = (p) => <LucideIcon name="Activity" {...p} />;
        const Baby = (p) => <LucideIcon name="Baby" {...p} />;
        const Stethoscope = (p) => <LucideIcon name="Stethoscope" {...p} />;
        const Microscope = (p) => <LucideIcon name="Microscope" {...p} />;
        const BookOpen = (p) => <LucideIcon name="BookOpen" {...p} />;
        const Calculator = (p) => <LucideIcon name="Calculator" {...p} />;
        const ShieldAlert = (p) => <LucideIcon name="ShieldAlert" {...p} />;
        const Calendar = (p) => <LucideIcon name="Calendar" {...p} />;
        const Dna = (p) => <LucideIcon name="Dna" {...p} />;
        const Syringe = (p) => <LucideIcon name="Syringe" {...p} />;
        const FileText = (p) => <LucideIcon name="FileText" {...p} />;
        const Menu = (p) => <LucideIcon name="Menu" {...p} />;
        const X = (p) => <LucideIcon name="X" {...p} />;
        const HelpCircle = (p) => <LucideIcon name="CircleHelp" {...p} />;
        const CheckCircle2 = (p) => <LucideIcon name="CircleCheckBig" {...p} />;
        const XCircle = (p) => <LucideIcon name="CircleX" {...p} />;
        const HeartPulse = (p) => <LucideIcon name="HeartPulse" {...p} />;
        const Brain = (p) => <LucideIcon name="Brain" {...p} />;
        const Bone = (p) => <LucideIcon name="Bone" {...p} />;
        const ArrowRight = (p) => <LucideIcon name="ArrowRight" {...p} />;
        const ImageIcon = (p) => <LucideIcon name="Image" {...p} />;
        const PenTool = (p) => <LucideIcon name="PenTool" {...p} />;
        const Sparkles = (p) => <LucideIcon name="Sparkles" {...p} />;
        const ChevronRight = (p) => <LucideIcon name="ChevronRight" {...p} />;

        // --- CÓDIGO DE LA APLICACIÓN ---

        function App() {
          const [activeTab, setActiveTab] = useState('inicio');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const handleTabChange = (tab) => {
            setActiveTab(tab);
            setIsMobileMenuOpen(false);
          };

          const renderContent = () => {
            switch(activeTab) {
              case 'inicio': return <Inicio />;
              case 'fisiopatologia': return <Fisiopatologia />;
              case 'diagnostico': return <Diagnostico />;
              case 'patologias': return <Patologias />;
              case 'simuladores': return <Simuladores />;
              case 'casos': return <CasosClinicos />;
              default: return <Inicio />;
            }
          };

          return (
            <div className="flex flex-col md:flex-row h-[100dvh] bg-slate-50 font-sans text-slate-800 overflow-hidden">
              
              {/* Mobile Header Ajustado */}
              <header className="md:hidden bg-slate-950 text-white p-4 flex justify-between items-center z-50 shadow-md shrink-0 sticky top-0 border-b border-slate-800">
                <div className="flex items-center gap-3">
                  <div className="bg-indigo-500/20 p-2 rounded-xl flex items-center justify-center">
                     {/* SVG puro para garantizar que nunca desaparezca */}
                     <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-400"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 1.5-2 1.5c-2 0-3.5 1.1-3.5 2.5 0 1.3 1.2 2.5 2.8 2.5"/></svg>
                  </div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent truncate">GenoClínica</h1>
                </div>
                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="p-2 bg-slate-800/80 rounded-xl text-slate-100 hover:bg-slate-700 transition-all focus:ring-2 focus:ring-indigo-500 shrink-0 min-w-[44px] min-h-[44px] flex items-center justify-center cursor-pointer"
                  aria-label="Abrir Menú"
                >
                  {isMobileMenuOpen ? (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                  ) : (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                  )}
                </button>
              </header>

              {/* Navigation Sidebar */}
              <nav className={`
                ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} 
                md:translate-x-0 absolute md:relative top-[73px] md:top-0 w-full md:w-80 h-[calc(100dvh-73px)] md:h-[100dvh] 
                bg-[#0B1121] text-slate-100 flex flex-col shadow-2xl z-40 transition-transform duration-400 ease-in-out shrink-0 border-r border-slate-800/50
              `}>
                <div className="hidden md:flex flex-col p-8 border-b border-slate-800/80 bg-gradient-to-b from-slate-900 to-[#0B1121] relative overflow-hidden shrink-0">
                  {/* Decoración sutil superior */}
                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                  
                  <div className="flex items-center gap-3 z-10">
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-500/20 shrink-0">
                       <Baby className="text-white" size={28} /> 
                    </div>
                    <h1 className="text-3xl font-extrabold tracking-tight text-white break-words">GenoClínica</h1>
                  </div>
                  <p className="text-xs text-indigo-300/80 mt-3 tracking-widest uppercase font-bold z-10 flex items-center gap-1">
                    <Microscope size={12} /> Medicina Integrada
                  </p>
                </div>

                <div className="flex-1 overflow-y-auto py-6 px-4 space-y-1.5 scrollbar-hide">
                  <NavItem icon={<BookOpen size={20}/>} label="Introducción y Glosario" active={activeTab === 'inicio'} onClick={() => handleTabChange('inicio')} />
                  <NavItem icon={<Microscope size={20}/>} label="Básicas: Fisiopatología" active={activeTab === 'fisiopatologia'} onClick={() => handleTabChange('fisiopatologia')} />
                  <NavItem icon={<Activity size={20}/>} label="Clínicas: Diagnóstico" active={activeTab === 'diagnostico'} onClick={() => handleTabChange('diagnostico')} />
                  
                  <div className="my-2 border-t border-slate-800/50 mx-2"></div>

                  <NavItem icon={<Dna size={20}/>} label="Atlas de Patologías" active={activeTab === 'patologias'} onClick={() => handleTabChange('patologias')} highlight />
                  
                  <div className="pt-6 pb-2 pl-3 flex items-center gap-2">
                    <Sparkles size={14} className="text-amber-400" />
                    <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest">Práctica y Entrenamiento</p>
                  </div>
                  <NavItem icon={<Calculator size={20}/>} label="Simuladores Clínicos" active={activeTab === 'simuladores'} onClick={() => handleTabChange('simuladores')} />
                  <NavItem icon={<HelpCircle size={20}/>} label="Casos Clínicos (Quiz)" active={activeTab === 'casos'} onClick={() => handleTabChange('casos')} />
                </div>
                
                {/* Pie de página de creador - AHORA SIEMPRE VISIBLE */}
                <div className="p-5 border-t border-slate-800/80 bg-slate-900/50 backdrop-blur-xl shrink-0 z-50">
                  <div className="bg-gradient-to-b from-slate-800 to-slate-800/40 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 border border-slate-700/50 shadow-inner group transition-all duration-500 hover:shadow-indigo-500/10 hover:border-indigo-500/30 cursor-default relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-r from-indigo-500/0 via-indigo-500/5 to-purple-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
                    
                    <span className="text-[10px] text-slate-400 uppercase tracking-widest flex items-center gap-1.5 font-bold z-10 break-words text-center">
                      Creado con <HeartPulse size={14} className="text-rose-500 animate-pulse drop-shadow-[0_0_8px_rgba(244,63,94,0.6)] shrink-0" /> por
                    </span>
                    <span className="text-base font-black bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 bg-clip-text text-transparent transform transition-all duration-300 group-hover:scale-105 drop-shadow-sm z-10 text-center break-words">
                      Richard Carbajal
                    </span>
                  </div>
                </div>
              </nav>

              {/* Main Content Area con fondo decorativo premium */}
              <main className="flex-1 overflow-y-auto overflow-x-hidden relative w-full bg-[#F8FAFC]">
                {/* Decoraciones de fondo absoluto */}
                <div className="absolute top-0 left-0 w-full h-[500px] bg-gradient-to-b from-indigo-100/50 via-slate-50/50 to-transparent -z-10 pointer-events-none"></div>
                <div className="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-300/10 rounded-full blur-[100px] -z-10 pointer-events-none translate-x-1/3 -translate-y-1/4"></div>
                <div className="absolute bottom-0 left-0 w-full h-full bg-dots opacity-30 -z-10 pointer-events-none"></div>

                <div className="max-w-6xl mx-auto p-4 sm:p-6 md:p-10 pb-20 relative z-10 w-full">
                  {renderContent()}
                </div>
              </main>
            </div>
          );
        }

        function Inicio() {
          return (
            <div className="space-y-8 animate-in fade-in duration-700 slide-in-from-bottom-8 w-full">
              {/* Hero Section Premium */}
              <div className="bg-gradient-to-br from-indigo-600 via-blue-600 to-cyan-500 rounded-[2rem] p-8 sm:p-10 md:p-14 text-white shadow-[0_20px_50px_rgba(79,70,229,0.3)] relative overflow-hidden group w-full">
                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                <div className="absolute -top-24 -right-24 w-96 h-96 bg-white opacity-10 rounded-full blur-3xl group-hover:scale-110 transition-transform duration-1000"></div>
                <div className="absolute bottom-0 left-0 w-64 h-64 bg-cyan-300 opacity-20 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
                
                <div className="relative z-10 w-full">
                  <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/20 backdrop-blur-md border border-white/30 text-xs font-bold uppercase tracking-widest mb-6 break-words text-center">
                    <Sparkles size={14} className="text-amber-300 shrink-0" />
                    Módulo de Especialidad
                  </div>
                  <h2 className="text-4xl md:text-5xl lg:text-6xl font-black mb-6 leading-[1.1] tracking-tight break-words">
                    Malformaciones <br/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-100 drop-shadow-sm">Congénitas</span>
                  </h2>
                  <p className="text-indigo-100 text-lg md:text-xl max-w-2xl leading-relaxed font-medium backdrop-blur-sm break-words">
                    Descifrando el desarrollo: De la morfogénesis básica celular al manejo multidisciplinario quirúrgico avanzado.
                  </p>
                </div>
                <Dna className="absolute -right-10 -bottom-10 text-white/10 w-64 h-64 md:w-80 md:h-80 transform rotate-12 group-hover:rotate-45 transition-transform duration-[3s]" />
              </div>

              {/* Cards de Información */}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full">
                <InfoCard title="Epidemiología Global" icon={<Activity className="text-rose-500" size={28}/>} color="rose">
                  Afectan al <strong className="text-rose-600 font-black">3-6%</strong> de los nacidos vivos. Son una de las principales causas de morbimortalidad infantil global (Datos ECLAMC) y demandan alta inversión en salud pública.
                </InfoCard>
                <InfoCard title="Etiología Compleja" icon={<Microscope className="text-purple-500" size={28}/>} color="purple">
                  50% Desconocida, 25% Multifactorial (genética + ambiente), 25% Genética pura (cromosómica o monogénica) y un pequeño porcentaje netamente teratogénico.
                </InfoCard>
                <InfoCard title="El Reto Clínico" icon={<Stethoscope className="text-teal-500" size={28}/>} color="teal">
                  Requiere integración transversal: ciencias básicas (embriología) en primeros ciclos y ciencias clínicas (imagenología, cirugía, genética) en el internado.
                </InfoCard>
              </div>

              {/* Glosario Glassmorphism */}
              <div className="bg-white/70 backdrop-blur-xl p-8 md:p-10 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white mt-6 relative overflow-hidden w-full">
                <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-100 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                <h3 className="text-2xl md:text-3xl font-extrabold mb-8 text-slate-800 flex items-center gap-3 relative z-10 break-words">
                  <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl shrink-0">
                    <FileText size={24} /> 
                  </div>
                  Glosario de Dismorfología
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10 items-stretch">
                  <DefItem term="Malformación" type="Primaria" color="indigo" def="Defecto estructural primario. El tejido se formó anormalmente desde el inicio celular (ej. Labio leporino, Espina Bífida)." />
                  <DefItem term="Deformación" type="Secundaria" color="amber" def="Alteración de la forma por fuerzas mecánicas sobre un tejido que ya era normal (ej. Pie zambo por oligohidramnios severo)." />
                  <DefItem term="Disrupción" type="Destructiva" color="rose" def="Destrucción de un tejido previamente normal, a menudo por isquemia o bridas (ej. Síndrome de banda amniótica amputando un miembro)." />
                  <DefItem term="Secuencia" type="Cascada" color="teal" def="Una anomalía primaria única desencadena defectos secundarios en cascada (ej. Secuencia de Pierre Robin: micrognatia -> glosoptosis -> paladar hendido)." />
                </div>
              </div>
            </div>
          );
        }

        function Fisiopatologia() {
          return (
            <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-700 fade-in w-full">
              <div className="mb-2 w-full break-words">
                <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">Etiología y Fisiopatología</h2>
                <p className="text-slate-500 mt-2 text-base md:text-lg font-medium">Comprendiendo las bases embriológicas y los agentes teratógenos.</p>
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 w-full">
                <div className="bg-white/80 backdrop-blur-xl p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white">
                  <h3 className="text-xl font-bold mb-8 flex items-center gap-3 text-slate-800 break-words">
                    <div className="p-2.5 bg-purple-100 text-purple-600 rounded-xl shrink-0"><Dna size={24}/></div> 
                    Genética vs Ambiente
                  </h3>
                  <div className="space-y-8">
                    <ProgressBar label="Desconocida / Multifactorial" percent="68" colorClass="bg-slate-400" textClass="text-slate-700" />
                    <ProgressBar label="Genética (Cromosomopatías)" percent="25" colorClass="bg-blue-500" textClass="text-blue-700" />
                    <ProgressBar label="Ambiental (Teratógenos puros)" percent="7" colorClass="bg-rose-500" textClass="text-rose-700" />
                  </div>
                </div>

                <div className="bg-white/80 backdrop-blur-xl p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white">
                  <h3 className="text-xl font-bold mb-8 flex items-center gap-3 text-slate-800 break-words">
                    <div className="p-2.5 bg-orange-100 text-orange-600 rounded-xl shrink-0"><ShieldAlert size={24}/></div>
                    Teratógenos Clásicos
                  </h3>
                  <div className="space-y-5">
                    <div className="group p-5 bg-gradient-to-r from-orange-50 to-transparent rounded-2xl border border-orange-100 hover:border-orange-300 transition-colors w-full break-words">
                      <h4 className="text-sm font-bold text-orange-800 uppercase mb-2 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-orange-500 shrink-0"></div> Infecciosos (TORCH + Zika)</h4>
                      <p className="text-sm text-slate-600 pl-3.5">Citomegalovirus (Microcefalia, calcificaciones), Rubeola (Cardiopatías, cataratas, sordera), Zika (Microcefalia severa).</p>
                    </div>
                    <div className="group p-5 bg-gradient-to-r from-red-50 to-transparent rounded-2xl border border-red-100 hover:border-red-300 transition-colors w-full break-words">
                      <h4 className="text-sm font-bold text-red-800 uppercase mb-2 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></div> Fármacos y Drogas</h4>
                      <p className="text-sm text-slate-600 pl-3.5">Ácido Valproico (Defectos tubo neural), Talidomida (Focomelia), Alcohol (Facies característica, SAF).</p>
                    </div>
                    <div className="group p-5 bg-gradient-to-r from-blue-50 to-transparent rounded-2xl border border-blue-100 hover:border-blue-300 transition-colors w-full break-words">
                      <h4 className="text-sm font-bold text-blue-800 uppercase mb-2 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div> Metabolismo Materno</h4>
                      <p className="text-sm text-slate-600 pl-3.5">Diabetes Pregestacional mal controlada (Síndrome de regresión caudal, hipertrofia septal cardiaca asimétrica).</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-gradient-to-r from-amber-200/50 via-yellow-100/50 to-amber-50 p-6 md:p-8 rounded-[2rem] border border-amber-200/50 shadow-lg shadow-amber-500/5 flex flex-col sm:flex-row sm:items-center gap-6 w-full break-words">
                <div className="bg-white p-4 rounded-2xl shadow-sm shrink-0 self-start sm:self-center">
                   <Calendar className="text-amber-500" size={32} />
                </div>
                <div className="flex-1">
                  <h3 className="text-amber-900 text-lg font-bold mb-2">Períodos Críticos (Perla Embriológica)</h3>
                  <p className="text-amber-900/80 text-base leading-relaxed">
                    La vulnerabilidad máxima a la dismorfogénesis ocurre durante el <strong className="bg-amber-200/50 px-1 rounded">período embrionario (semanas 3 a 8)</strong>. Durante esta ventana, las células están en rápida diferenciación. Una exposición teratogénica aquí causa defectos anatómicos mayores.
                  </p>
                </div>
              </div>
            </div>
          );
        }

        function Diagnostico() {
          return (
            <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-700 fade-in w-full">
              <div className="mb-6 w-full break-words">
                <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">Línea de Tiempo Diagnóstica</h2>
                <p className="text-slate-500 mt-2 text-base md:text-lg font-medium">Del cribado prenatal no invasivo a la evaluación neonatal.</p>
              </div>
              
              <div className="relative max-w-4xl mx-auto w-full">
                {/* Línea central brillante */}
                <div className="absolute left-8 md:left-1/2 top-8 bottom-8 w-1.5 bg-gradient-to-b from-indigo-400 via-purple-400 to-rose-400 rounded-full md:-translate-x-1/2 shadow-[0_0_15px_rgba(99,102,241,0.4)]"></div>
                
                <div className="space-y-12 relative z-10 w-full">
                  {/* Etapa 1 */}
                  <div className="flex flex-col md:flex-row items-center gap-6 md:gap-12 w-full">
                    <div className="md:w-1/2 flex justify-start md:justify-end pl-20 md:pl-0 w-full">

                        <div className="space-y-3">
                          <p className="text-sm text-slate-600"><strong className="text-slate-800">Amniocentesis:</strong> Estudio directo de ADN (Exoma, Microarrays). Diagnóstico definitivo.</p>
                          <div className="h-px w-full bg-slate-100"></div>
                          <p className="text-sm text-slate-600"><strong className="text-slate-800">Eco Morfológica (Sem 20):</strong> Evaluación anatómica fetal detallada órgano por órgano.</p>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Etapa 3 */}
                  <div className="flex flex-col md:flex-row items-center gap-6 md:gap-12 w-full">

                      <div className="bg-gradient-to-br from-rose-50 to-white p-6 rounded-2xl shadow-xl shadow-rose-500/10 border border-rose-100 w-full max-w-sm hover:-translate-y-1 transition-transform duration-300 break-words">

        function MedicalImage({ src, alt, id, mode }) {
          const [imgStatus, setImgStatus] = useState('loading'); 

          useEffect(() => {
            setImgStatus('loading');
          }, [src]);

          if (mode === 'esquema') {
            return (
              <div className="w-full h-full bg-slate-50/50 rounded-2xl overflow-hidden">
                <MedicalIllustration id={id} />
              </div>
            );
          }

          return (
            <div className="w-full h-full relative flex flex-col items-center justify-center bg-slate-50/50 rounded-2xl overflow-hidden group">
              {imgStatus === 'error' ? (
                <>
                  <div className="absolute top-4 right-4 bg-amber-100/90 backdrop-blur-sm text-amber-800 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-amber-200 z-20 flex items-center gap-1.5 shadow-sm break-words">
                    <ShieldAlert size={14} className="shrink-0" /> Esquema (Red Segura)
                  </div>
                  <MedicalIllustration id={id} />
                </>
              ) : (
                <>
                  {imgStatus === 'loading' && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10">
                      <div className="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                      <span className="text-xs text-slate-500 font-bold tracking-widest uppercase text-center break-words px-4">Cargando visualizador...</span>
                    </div>
                  )}
                  <a href={src} target="_blank" rel="noreferrer" className="w-full h-full flex items-center justify-center cursor-zoom-in p-4" title="Clic para ampliar original">
                    <img
                      src={src}
                      alt={alt}
                      className={`max-w-full max-h-full object-contain transition-all duration-500 rounded-xl ${imgStatus === 'loading' ? 'opacity-0 scale-95' : 'opacity-100 scale-100'} group-hover:scale-105 group-hover:shadow-lg`}
                      onLoad={() => setImgStatus('success')}
                      onError={() => setImgStatus('error')}
                      crossOrigin="anonymous"
                    />
                  </a>
                </>
              )}
            </div>
          );
        }

        function Patologias() {
          const [selectedPathology, setSelectedPathology] = useState(0);
          const [filter, setFilter] = useState('Todas');
          const [imageMode, setImageMode] = useState('esquema');

          const pathologies = [
            {
              id: "neuro",
              title: "Defectos del Tubo Neural",
              system: "Neurológico",
              icon: <Brain size={28} />,
              color: "purple",
              imageUrl: "https://www.cdc.gov/birth-defects/media/images/2024/04/spinabif_1200x675.jpg?_=86182",
              basic: "Falla en el cierre del neuroporo craneal (anencefalia) o caudal (espina bífida) entre los días 26-28. Prevenible con suplementación de Ácido Fólico.",
              clinical: "Mielomeningocele (MM): Protrusión de meninges y médula. Produce paraplejía, vejiga neurogénica e hidrocefalia (Malformación de Chiari II).",
              treatment: "Estudio MOMS demostró que la cirugía fetal (prenatal) reduce necesidad de válvula de derivación VP y mejora resultados motores vs cirugía posnatal."
            },
            {
              id: "cardio",
              title: "Cardiopatías Congénitas",
              system: "Cardiovascular",
              icon: <HeartPulse size={28} />,
              color: "rose",
              imageUrl: "https://lh5.googleusercontent.com/proxy/Dwq3eCYSybZfME5zkIWS_FOp1KjcBHVqRf0aexckP28GD2ChJEGcR8zSCinIwipPpSkjkgVupUS80DL_zafXQcy_WAuXgkmAlHe87A90NnqoJawmzCsplMUr8magMRKahMRtava21eHojQ",
              basic: "Malformación grave más frecuente (3/1000). Alteraciones en tabicación (CIV/CIA) o desarrollo troncoconal (Fallot, TGV) semanas 4-8.",
              clinical: "Cianóticas (Tetralogía de Fallot, TGV) vs Acianóticas con cortocircuito I-D (CIV, CIA). Prueba de hiperoxia clave para diagnóstico neonatal.",
              treatment: "PGE1 (Prostaglandina E1 / Alprostadil) IV continuo salva vidas manteniendo el ductus permeable en neonatos con cardiopatías ductus-dependientes antes de cirugía."
            },
            {
              id: "cadera",
              title: "Displasia de Cadera (DDC)",
              system: "Musculoesquelético",
              icon: <Bone size={28} />,
              color: "slate",
              imageUrl: "https://static.elsevier.es/multimedia/07168640/0000003200000003/v1_202106010528/S0716864021000511/v1_202106010528/es/main.assets/gr1.jpeg",
              basic: "No es una luxación congénita abrupta, sino un proceso de deformidad evolutiva de la cavidad acetabular y cabeza femoral. Mayor riesgo en niñas podálicas.",
              clinical: "Signos: Ortolani (reduce), Barlow (luxa), Galeazzi (asimetría).",
              treatment: "Ecografía es el gold-standard en <6 meses (RX no sirve por cartílago). Tratamiento temprano con Arnés de Pavlik."
            },
            {
              id: "labio",
              title: "Labio y Paladar Hendido",
              system: "Gastrointestinal/Facial",
              icon: <Baby size={28} />,
              color: "blue",
              imageUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBBtk_CCxoBGjIgxVV_gr4Nweh0jrA7DhuPw&s",
              basic: "Labio: Falla fusión de prominencias maxilares con nasales mediales. Paladar: Falla fusión crestas palatinas. Pueden aislarse o asociarse a síndromes.",
              clinical: "Clasificación de Veau. Riesgo alto de broncoaspiración, otitis media recurrente e hipernasalidad.",
              treatment: "Queiloplastia (labio) a los 3-6 meses (Regla de los 10: 10 sem, 10 lbs, 10g Hb). Palatoplastia 9-18 meses antes del desarrollo del habla."
            },
            {
              id: "down",
              title: "Síndrome de Down",
              system: "Genético/Cromosómico",
              icon: <Dna size={28} />,
              color: "emerald",
              imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/21_trisomy_-_Down_syndrome.png/250px-21_trisomy_-_Down_syndrome.png",
              basic: "El 95% es por no disyunción meiótica materna. El riesgo aumenta exponencialmente con la edad materna (>35 años).",
              clinical: "Hipotonía, fisuras palpebrales oblicuas, macroglosia, pliegue palmar transverso. El 50% tienen cardiopatías (Canal AV común es típico).",
              treatment: "Manejo sintomático e intervención temprana. Ecocardiograma obligatorio al nacer. Evaluación tiroidea anual."
            },
            {
              id: "hernia",
              title: "Hernia Diafragmática",
              system: "Respiratorio/Gastrointestinal",
              icon: <LungsIcon size={28} />,
              color: "cyan",
              imageUrl: "https://www.cdc.gov/birth-defects/media/images/diaphragmatichernia_1.png",
              basic: "Defecto en el cierre del canal pleuroperitoneal (más común en el lado izquierdo - Foramen de Bochdalek). Las vísceras abdominales suben al tórax.",
              clinical: "Abdomen excavado al nacer, ruidos hidroaéreos en tórax, dificultad respiratoria severa. El problema real es la hipoplasia pulmonar subyacente.",
              treatment: "Intubación inmediata (¡NUNCA ventilar con bolsa-mascarilla porque infla estómago y comprime pulmón!). Cirugía diferida tras estabilización."
            }
          ];

          const filteredPathologies = filter === 'Todas' ? pathologies : pathologies.filter(p => p.system.includes(filter) || p.system === 'Genético/Cromosómico');
          const activePath = pathologies[selectedPathology];

          const getColorTheme = (color) => {
            const map = {
              purple: { bg: 'bg-purple-100', text: 'text-purple-600', active: 'border-purple-500 ring-purple-500/20' },
              rose: { bg: 'bg-rose-100', text: 'text-rose-600', active: 'border-rose-500 ring-rose-500/20' },
              slate: { bg: 'bg-slate-200', text: 'text-slate-700', active: 'border-slate-500 ring-slate-500/20' },
              blue: { bg: 'bg-blue-100', text: 'text-blue-600', active: 'border-blue-500 ring-blue-500/20' },
              emerald: { bg: 'bg-emerald-100', text: 'text-emerald-600', active: 'border-emerald-500 ring-emerald-500/20' },
              cyan: { bg: 'bg-cyan-100', text: 'text-cyan-600', active: 'border-cyan-500 ring-cyan-500/20' },
            };
            return map[color] || map.blue;
          };

          return (
            <div className="space-y-6 md:space-y-8 animate-in fade-in duration-700 slide-in-from-bottom-8 flex flex-col min-h-full w-full">
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-4 w-full break-words">
                <div>
                  <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">Atlas de Patologías</h2>
                  <p className="text-slate-500 mt-2 text-base font-medium">Correlación Básico-Clínica interactiva.</p>

                {/* Filtros Estilizados */}
                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide max-w-full">
                  {['Todas', 'Cardiovascular', 'Neurológico', 'Musculoesquelético'].map(sys => (
                     <button 
                      key={sys}
                      onClick={() => setFilter(sys)}
                      className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all duration-300 shrink-0 ${
                        filter === sys 
                          ? 'bg-slate-800 text-white shadow-lg scale-105' 
                          : 'bg-white text-slate-500 hover:bg-slate-200 border border-slate-200'
                      }`}
                     >
                       {sys}
                     </button>
                  ))}
                </div>
              </div>
              
              <div className="flex flex-col lg:flex-row gap-6 lg:gap-8 flex-1 w-full">
                {/* Lista Seleccionable Premium */}
                <div className="lg:w-1/3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3 content-start">
                  {filteredPathologies.map((path, idx) => {
                    const originalIndex = pathologies.findIndex(p => p.title === path.title);
                    const isActive = selectedPathology === originalIndex;
                    const theme = getColorTheme(path.color);

                    return (
                      <button
                        key={idx}
                        onClick={() => setSelectedPathology(originalIndex)}
                        className={`w-full flex items-center gap-4 p-4 rounded-2xl text-left transition-all duration-300 border-2 relative overflow-hidden group break-words ${
                          isActive 
                            ? `bg-white border-transparent shadow-xl ring-4 ${theme.active} scale-[1.02]` 
                            : 'bg-white/60 border-slate-200/60 hover:bg-white hover:border-slate-300 hover:shadow-md'
                        }`}
                      >
                        {isActive && <div className={`absolute top-0 left-0 w-1.5 h-full ${theme.bg.replace('100', '500')}`}></div>}

                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 relative z-10 w-full">

                         <button

                       </div>
                    </div>

                    {/* Visor de Imágenes */}

                       <MedicalImage src={activePath.imageUrl} alt={activePath.title} id={activePath.id} mode={imageMode} />
                    </div>
                    
                    {/* Contenido de Texto */}
                    <div className="space-y-4 relative z-10 flex-1 w-full">
                      <div className="group w-full break-words">
                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                          <Microscope size={14} className="text-indigo-400 shrink-0"/> Ciencias Básicas (Embriología)
                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50/80 p-4 rounded-2xl border border-slate-100 group-hover:bg-indigo-50/50 group-hover:border-indigo-100 transition-colors text-pretty">{activePath.basic}</p>
                      </div>
                      
                      <div className="group w-full break-words">
                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                          <Stethoscope size={14} className="text-teal-400 shrink-0"/> Diagnóstico y Clínica
                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50/80 p-4 rounded-2xl border border-slate-100 group-hover:bg-teal-50/50 group-hover:border-teal-100 transition-colors text-pretty">{activePath.clinical}</p>
                      </div>
                      
                      <div className="group w-full break-words">
                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">

                        </h4>
                        <p className="text-sm md:text-base text-slate-700 leading-relaxed bg-slate-50/80 p-4 rounded-2xl border border-slate-100 group-hover:bg-rose-50/50 group-hover:border-rose-100 transition-colors text-pretty">{activePath.treatment}</p>

        function Simuladores() {
          const [activeSim, setActiveSim] = useState('silverman');

          return (
            <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-700 fade-in w-full">
              <div className="mb-4 w-full break-words">
                <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                  <Calculator className="text-indigo-600 shrink-0"/> Simuladores Clínicos
                </h2>
                <p className="text-slate-500 mt-2 text-base md:text-lg font-medium">Herramientas interactivas para la toma de decisiones.</p>
              </div>

              <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide max-w-full -mx-4 px-4 md:mx-0 md:px-0">
                <button onClick={()=>setActiveSim('silverman')} className={`px-6 py-3 rounded-xl font-bold text-sm transition-all duration-300 whitespace-nowrap shrink-0 border-2 ${activeSim==='silverman' ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-500/30 -translate-y-1' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200'}`}>Silverman-Andersen</button>
                <button onClick={()=>setActiveSim('apgar')} className={`px-6 py-3 rounded-xl font-bold text-sm transition-all duration-300 whitespace-nowrap shrink-0 border-2 ${activeSim==='apgar' ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-500/30 -translate-y-1' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200'}`}>Test de APGAR</button>
                <button onClick={()=>setActiveSim('ddc')} className={`px-6 py-3 rounded-xl font-bold text-sm transition-all duration-300 whitespace-nowrap shrink-0 border-2 ${activeSim==='ddc' ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-500/30 -translate-y-1' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200'}`}>Riesgo DDC</button>
                <button onClick={()=>setActiveSim('acido')} className={`px-6 py-3 rounded-xl font-bold text-sm transition-all duration-300 whitespace-nowrap shrink-0 border-2 ${activeSim==='acido' ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-500/30 -translate-y-1' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200'}`}>Dosis Ácido Fólico</button>
              </div>

              <div className="bg-white/90 backdrop-blur-xl p-6 md:p-10 rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-white w-full">
                {activeSim === 'silverman' && <SimuladorSilverman />}
                {activeSim === 'ddc' && <SimuladorDDC />}
                {activeSim === 'apgar' && <SimuladorAPGAR />}
                {activeSim === 'acido' && <SimuladorAcidoFolico />}
              </div>
            </div>
          );
        }

        // Sub-componentes de Simuladores con estilos mejorados
        function SimuladorSilverman() {
          const [scores, setScores] = useState({ disociacion: 0, retraccion: 0, tiraje: 0, aleteo: 0, quejido: 0 });
          const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
          const getResult = (score) => {
            if (score === 0) return { label: "Sin Dificultad Respiratoria", color: "text-emerald-400", bg: "from-emerald-900 to-slate-900" };
            if (score <= 3) return { label: "Dificultad Leve", color: "text-amber-400", bg: "from-amber-900 to-slate-900" };
            if (score <= 6) return { label: "Dificultad Moderada", color: "text-orange-400", bg: "from-orange-900 to-slate-900" };
            return { label: "Dificultad Severa", color: "text-rose-400", bg: "from-rose-900 to-slate-900" };
          };
          const res = getResult(totalScore);
          const options = {
            disociacion: [{val: 0, label: "Sincronizado"}, {val: 1, label: "Retraso inspiratorio"}, {val: 2, label: "Balanceo"}],
            retraccion: [{val: 0, label: "Ausente"}, {val: 1, label: "Apenas visible"}, {val: 2, label: "Marcada"}],
            tiraje: [{val: 0, label: "Ausente"}, {val: 1, label: "Apenas visible"}, {val: 2, label: "Marcado"}],
            aleteo: [{val: 0, label: "Ausente"}, {val: 1, label: "Mínimo"}, {val: 2, label: "Marcado"}],
            quejido: [{val: 0, label: "Ausente"}, {val: 1, label: "Con estetoscopio"}, {val: 2, label: "A distancia"}]
          };
          const labels = ["Disociación Tóraco-Abdominal", "Retracción Xifoidea", "Tiraje Intercostal", "Aleteo Nasal", "Quejido Espiratorio"];

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full break-words">
              <div className="space-y-4 w-full">
                {Object.keys(options).map((key, idx) => (
                  <div key={key} className="bg-slate-50/80 p-4 rounded-2xl border border-slate-200/60 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition-all w-full">
                    <p className="font-bold text-sm text-slate-700 mb-2 truncate">{labels[idx]}</p>
                    <select 
                      className="w-full p-2.5 text-sm rounded-xl border border-slate-300 bg-white outline-none focus:ring-0 cursor-pointer break-words"
                      value={scores[key]}
                      onChange={(e) => setScores({...scores, [key]: parseInt(e.target.value)})}
                    >
                      {options[key].map(opt => <option key={opt.val} value={opt.val}>{opt.label} ({opt.val} pts)</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <div className={`flex flex-col justify-center items-center p-10 bg-gradient-to-br ${res.bg} rounded-[2rem] border border-white/10 text-white shadow-2xl relative overflow-hidden w-full`}>
                <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
                <p className="text-slate-400 font-bold text-xs tracking-widest uppercase mb-4 z-10 text-center">Puntuación Silverman</p>
                <div className={`text-8xl md:text-9xl font-black mb-6 leading-none ${res.color} drop-shadow-lg z-10 text-center`}>{totalScore}</div>
                <div className={`px-6 py-2.5 rounded-full font-bold text-base bg-white/10 backdrop-blur-md border border-white/20 ${res.color} text-center z-10 max-w-full break-words`}>
                  {res.label}
                </div>
              </div>
            </div>
          );
        }

        function SimuladorAPGAR() {
          const [scores, setScores] = useState({ a: 0, p: 0, g: 0, a2: 0, r: 0 });
          const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
          const getResult = (score) => {
            if (score >= 7) return { label: "Vigoroso (Normal)", color: "text-emerald-400", bg: "from-emerald-900 to-slate-900" };
            if (score >= 4) return { label: "Depresión Moderada", color: "text-amber-400", bg: "from-amber-900 to-slate-900" };
            return { label: "Depresión Severa", color: "text-rose-400", bg: "from-rose-900 to-slate-900" };
          };
          const res = getResult(totalScore);
          const options = {
            a: [{val: 0, label: "Cianosis generalizada o palidez"}, {val: 1, label: "Acrocianosis (extremidades azules)"}, {val: 2, label: "Completamente rosado"}],
            p: [{val: 0, label: "Ausente"}, {val: 1, label: "< 100 latidos por minuto"}, {val: 2, label: "> 100 latidos por minuto"}],
            g: [{val: 0, label: "Sin respuesta"}, {val: 1, label: "Mueca leve / llanto débil"}, {val: 2, label: "Llanto vigoroso"}],
            a2: [{val: 0, label: "Flácido"}, {val: 1, label: "Cierta flexión"}, {val: 2, label: "Movimientos activos"}],
            r: [{val: 0, label: "Ausente"}, {val: 1, label: "Lento, irregular"}, {val: 2, label: "Llanto fuerte"}]
          };

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full break-words">
              <div className="space-y-4 w-full">
                {Object.keys(options).map((key, idx) => (
                  <div key={key} className="bg-slate-50/80 p-4 rounded-2xl border border-slate-200/60 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition-all w-full">
                    <p className="font-bold text-sm text-slate-700 mb-2 truncate">{['Apariencia (Color)', 'Pulso (Frec. Cardiaca)', 'Gesticulación (Reflejos)', 'Actividad (Tono)', 'Respiración (Esfuerzo)'][idx]}</p>
                    <select 
                      className="w-full p-2.5 text-sm rounded-xl border border-slate-300 bg-white outline-none focus:ring-0 cursor-pointer break-words"
                      value={scores[key]}
                      onChange={(e) => setScores({...scores, [key]: parseInt(e.target.value)})}
                    >
                      {options[key].map(opt => <option key={opt.val} value={opt.val}>{opt.label} ({opt.val} pts)</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <div className={`flex flex-col justify-center items-center p-10 bg-gradient-to-br ${res.bg} rounded-[2rem] border border-white/10 text-white shadow-2xl relative overflow-hidden w-full`}>
                <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
                <p className="text-slate-400 font-bold text-xs tracking-widest uppercase mb-4 z-10 text-center">Puntuación APGAR</p>
                <div className={`text-8xl md:text-9xl font-black mb-6 leading-none ${res.color} drop-shadow-lg z-10 text-center`}>{totalScore}</div>
                <div className={`px-6 py-2.5 rounded-full font-bold text-base bg-white/10 backdrop-blur-md border border-white/20 ${res.color} text-center z-10 max-w-full break-words`}>
                  {res.label}
                </div>
              </div>
            </div>
          );
        }

        function SimuladorDDC() {
          const [factors, setFactors] = useState({ female: false, breech: false, family: false, oligo: false });
          let score = (factors.female ? 1 : 0) + (factors.breech ? 3 : 0) + (factors.family ? 2 : 0) + (factors.oligo ? 1 : 0);
          const getRec = () => {
            if (score === 0) return { l: "Riesgo Bajo", d: "Examen pediátrico de rutina.", c: "bg-emerald-500", bg: "from-emerald-900 to-slate-900", t: "text-emerald-400" };
            if (score <= 2) return { l: "Riesgo Moderado", d: "Ecografía a las 4-6 semanas si hay duda.", c: "bg-amber-500", bg: "from-amber-900 to-slate-900", t: "text-amber-400" };
            return { l: "Alto Riesgo", d: "Ecografía obligatoria 4-6 sem. Derivar.", c: "bg-rose-500", bg: "from-rose-900 to-slate-900", t: "text-rose-400" };
          };
          const rec = getRec();
          const toggle = (k) => setFactors({...factors, [k]: !factors[k]});

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full break-words">
              <div className="space-y-3 w-full">
                <p className="text-sm font-bold text-slate-500 mb-4 uppercase tracking-widest text-center lg:text-left">Factores al nacimiento:</p>
                {[
                  { id: 'female', label: 'Sexo Femenino', desc: 'Mayor laxitud ligamentaria por estrógenos.' },
                  { id: 'breech', label: 'Presentación Podálica', desc: 'Alta compresión mecánica intrauterina.' },
                  { id: 'family', label: 'Historia Familiar', desc: 'Antecedentes directos de DDC.' },
                  { id: 'oligo', label: 'Oligohidramnios', desc: 'Asociado a deformaciones por moldeo.' }
                ].map(f => (
                  <div key={f.id} onClick={()=>toggle(f.id)} className={`cursor-pointer border-2 p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 w-full break-words ${factors[f.id] ? 'border-indigo-500 bg-indigo-50 shadow-md transform scale-[1.02]' : 'border-slate-200 bg-slate-50 hover:bg-white hover:border-slate-300'}`}>
                    <div className={`w-6 h-6 rounded-full flex items-center justify-center border-2 shrink-0 transition-colors ${factors[f.id] ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300 bg-white'}`}>
                      {factors[f.id] && <div className="w-2.5 h-2.5 bg-white rounded-full shrink-0"></div>}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className={`font-bold text-base leading-tight mb-1 text-wrap ${factors[f.id] ? 'text-indigo-900' : 'text-slate-700'}`}>{f.label}</p>
                      <p className="text-xs text-slate-500 text-pretty">{f.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
              <div className={`flex flex-col justify-center p-10 bg-gradient-to-br ${rec.bg} rounded-[2rem] border border-white/10 text-white shadow-2xl relative overflow-hidden w-full break-words`}>
                <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
                <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 z-10 text-center lg:text-left">Directriz Clínica</h4>
                <div className="h-2 w-full rounded-full bg-white/10 overflow-hidden mb-6 z-10"><div className={`h-full ${rec.c} transition-all duration-700 ease-out`} style={{width: `${Math.min(100, (score/4)*100)}%`}}></div></div>
                <h3 className={`text-4xl font-black mb-4 ${rec.t} leading-tight z-10 text-center lg:text-left text-wrap`}>{rec.l}</h3>
                <p className="text-slate-200 text-lg z-10 text-center lg:text-left text-pretty">{rec.d}</p>
              </div>
            </div>
          );
        }

        function SimuladorAcidoFolico() {
          const [factors, setFactors] = useState({ ant: false, db: false, epi: false, imc: false });
          const isHighRisk = factors.ant || factors.db || factors.epi || factors.imc;
          const toggle = (k) => setFactors({...factors, [k]: !factors[k]});

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full break-words">
              <div className="space-y-3 w-full">
                <p className="text-sm font-bold text-slate-500 mb-4 uppercase tracking-widest text-center lg:text-left">Riesgos Maternos:</p>
                {[
                  { id: 'ant', label: 'Antecedente previo', desc: 'Feto anterior con Espina Bífida o Anencefalia.' },
                  { id: 'db', label: 'Diabetes Pregestacional', desc: 'Diabetes tipo 1 o 2.' },
                  { id: 'epi', label: 'Uso Anticonvulsivantes', desc: 'Especialmente Ácido Valproico.' },
                  { id: 'imc', label: 'Obesidad Severa', desc: 'IMC > 35.' }
                ].map(f => (
                  <div key={f.id} onClick={()=>toggle(f.id)} className={`cursor-pointer border-2 p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 w-full break-words ${factors[f.id] ? 'border-rose-500 bg-rose-50 shadow-md transform scale-[1.02]' : 'border-slate-200 bg-slate-50 hover:bg-white'}`}>
                    <div className={`w-6 h-6 rounded-md flex items-center justify-center border-2 shrink-0 transition-colors ${factors[f.id] ? 'border-rose-600 bg-rose-600' : 'border-slate-300 bg-white'}`}>
                      {factors[f.id] && <CheckCircle2 size={16} className="text-white shrink-0" strokeWidth={3} />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className={`font-bold text-base leading-tight mb-1 text-wrap ${factors[f.id] ? 'text-rose-900' : 'text-slate-700'}`}>{f.label}</p>
                      <p className="text-xs text-slate-500 text-pretty">{f.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
              <div className={`flex flex-col justify-center items-center text-center p-10 rounded-[2rem] border border-white/10 shadow-2xl relative overflow-hidden transition-colors duration-500 w-full break-words ${isHighRisk ? 'bg-gradient-to-br from-rose-900 to-slate-900' : 'bg-gradient-to-br from-emerald-900 to-slate-900'}`}>
                <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
                <h4 className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-8 z-10 text-center">Dosis Preconcepcional</h4>
                
                <div key={isHighRisk ? 'high' : 'low'} className="animate-in zoom-in duration-500 flex flex-col items-center z-10 w-full text-center">
                  <div className={`text-7xl md:text-8xl font-black mb-6 drop-shadow-lg ${isHighRisk ? 'text-rose-400' : 'text-emerald-400'}`}>
                    {isHighRisk ? '4-5' : '400'} 
                    <span className="text-3xl ml-2">{isHighRisk ? 'mg' : 'mcg'}</span>
                  </div>
                  <p className={`font-black text-sm px-6 py-2.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-wrap break-words max-w-full ${isHighRisk ? 'text-rose-300' : 'text-emerald-300'}`}>
                    {isHighRisk ? 'Dosis Alta (Terapéutica)' : 'Dosis Estándar (Profilaxis)'}
                  </p>
                </div>
              </div>
            </div>
          );
        }

        function CasosClinicos() {
          const [currentCase, setCurrentCase] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);

          const cases = [
            {
              question: "Recién nacido de 1 hora de vida, producto de madre diabética pregestacional mal controlada. Presenta cianosis central que no revierte tras la prueba de hiperoxia (O2 al 100% por 10 min). ¿Cuál es la sospecha diagnóstica más probable y la medida terapéutica inicial urgente?",
              options: [
                "Enfermedad de membrana hialina; administrar surfactante.",
                "Cardiopatía congénita cianótica (ej. Transposición Grandes Vasos); iniciar Prostaglandina E1 (Alprostadil) IV.",
                "Cierre prematuro del ductus arterioso; administrar Indometacina.",
                "Hernia diafragmática congénita; ventilar con bolsa-mascarilla."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! Una cianosis que no responde a la prueba de hiperoxia indica un cortocircuito derecha-izquierda (origen cardíaco, no pulmonar). En recién nacidos de madres diabéticas hay mayor riesgo de cardiopatías (como TGV). Es vital iniciar Prostaglandinas (PGE1) para mantener el ductus arterioso permeable y asegurar la mezcla de sangre hasta la cirugía."
            },
            {
              question: "En la evaluación de una niña recién nacida, nacida en presentación podálica, se realiza una maniobra de abducción y tracción de la cadera izquierda, sintiendo un 'cloc' palpable de entrada de la cabeza femoral al acetábulo. Este signo se conoce como:",
              options: [
                "Signo de Galeazzi.",
                "Maniobra de Barlow (positiva).",
                "Maniobra de Ortolani (positiva).",
                "Signo del pliegue asimétrico."
              ],
              correctAnswer: 2,
              explanation: "¡Correcto! La maniobra de Ortolani 'O' de 'Open' (abrir/abducción) busca RE-DUCIR una cadera que ya estaba luxada en reposo. Al entrar al acetábulo se siente el chasquido o 'cloc'. La maniobra de Barlow busca LUXAR una cadera inestable (se empuja hacia atrás)."
            },
            {
              question: "Mujer de 38 años en su semana 12 de gestación. La ecografía reporta una translucencia nucal severamente aumentada y ausencia de hueso nasal. ¿Cuál es el siguiente paso diagnóstico más apropiado dado el alto riesgo?",
              options: [
                "Tranquilizar a la madre y repetir ecografía en 4 semanas.",
                "Biopsia de vellosidades coriales o NIPT (ADN fetal libre) para estudio genético.",
                "Amniocentesis inmediata.",
                "Programar cirugía fetal por sospecha de defecto del tubo neural."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! La TN aumentada y ausencia de hueso nasal son marcadores ecográficos muy fuertes de cromosomopatías (como Trisomía 21). El paso a seguir es ofrecer un Test de ADN fetal en sangre materna (NIPT) como cribado de altísima sensibilidad o directamente una Biopsia de Vellosidades Coriales para confirmación diagnóstica (la amniocentesis no se realiza antes de la semana 15)."
            },
            {
              question: "Se recibe a un recién nacido en la sala de partos que presenta un abdomen excavado (escafoide), dificultad respiratoria severa y ruidos hidroaéreos audibles en el hemitórax izquierdo. ¿Qué acción está absolutamente CONTRAINDICADA en el manejo inicial de este paciente?",
              options: [
                "Intubación endotraqueal inmediata.",
                "Colocación de sonda orogástrica para descompresión.",
                "Ventilación con bolsa-mascarilla (ambú).",
                "Monitorización continua de saturación de oxígeno preductal."
              ],
              correctAnswer: 2,
              explanation: "¡Correcto! La presentación clínica es clásica de una Hernia Diafragmática Congénita. La ventilación a presión positiva con bolsa-mascarilla está contraindicada porque el aire ingresa al estómago e intestinos (alojados en el tórax), distendiéndolos y comprimiendo aún más el pulmón hipoplásico. El paciente debe ser intubado inmediatamente."
            },
            {
              question: "Un feto es diagnosticado con mielomeningocele lumbosacro a las 20 semanas de gestación. Los padres preguntan sobre el beneficio de la cirugía fetal intrauterina frente a esperar para operar después del nacimiento. Según la evidencia actual (Estudio MOMS), usted les explica que la cirugía fetal:",
              options: [
                "Cura completamente la enfermedad y garantiza una función motora normal al 100%.",
                "Reduce significativamente la necesidad de derivación ventrículo-peritoneal para la hidrocefalia y mejora los resultados motores.",
                "Solo tiene propósitos estéticos y no afecta el desarrollo neurológico a largo plazo del paciente.",
                "Aumenta la tasa de mortalidad fetal severamente pero reduce el riesgo de rotura uterina."
              ],
              correctAnswer: 1,
              explanation: "¡Correcto! El célebre ensayo clínico MOMS (Management of Myelomeningocele Study) demostró que la reparación prenatal, comparada con la posnatal, revierte parcialmente la malformación de Chiari II, reduciendo a la mitad la necesidad de colocar una válvula de derivación (shunt) y mejorando sustancialmente la capacidad del niño para caminar de forma independiente."
            }
          ];

          const handleAnswer = (index) => {
            if (isAnswered) return;
            setSelectedAnswer(index);
            setIsAnswered(true);
          };

          const nextCase = () => {
            setCurrentCase((prev) => (prev + 1) % cases.length);
            setSelectedAnswer(null);
            setIsAnswered(false);
          };

          const cCase = cases[currentCase];

          return (
            <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-700 fade-in max-w-4xl mx-auto w-full">
              <div className="mb-8 text-center w-full break-words">
                <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight flex items-center justify-center gap-3">
                  <HelpCircle className="text-indigo-600 shrink-0"/> Casos Clínicos
                </h2>
                <p className="text-slate-500 mt-3 text-base md:text-lg font-medium">Evalúa tus conocimientos integrando ciencias básicas y clínica.</p>
              </div>

              <div className="bg-white/90 backdrop-blur-xl p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-white relative overflow-hidden w-full break-words">
                <div className="absolute top-0 left-0 w-full h-2 bg-slate-100">
                   <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500" style={{ width: `${((currentCase + 1) / cases.length) * 100}%` }}></div>
                </div>

                <div className="flex justify-between items-center mb-8 mt-2">
                  <span className="text-xs font-black uppercase tracking-widest text-slate-400 bg-slate-100 px-3 py-1.5 rounded-lg break-words text-center">Caso {currentCase + 1} de {cases.length}</span>
                </div>

                <p className="text-xl md:text-2xl font-bold text-slate-800 mb-10 leading-relaxed text-pretty">
                  {cCase.question}
                </p>

                <div className="space-y-4 w-full">
                  {cCase.options.map((opt, idx) => {
                    let btnClass = "bg-slate-50 border-slate-200 text-slate-600 hover:bg-white hover:border-indigo-300 hover:shadow-md hover:-translate-y-0.5";
                    let Icon = <div className="w-5 h-5 rounded-full border-2 border-slate-300 shrink-0"></div>;

                    if (isAnswered) {
                      if (idx === cCase.correctAnswer) {
                        btnClass = "bg-emerald-50 border-emerald-500 text-emerald-900 shadow-lg transform scale-[1.02] ring-4 ring-emerald-500/20 z-10";
                        Icon = <CheckCircle2 className="text-emerald-500 shrink-0" size={24} fill="#d1fae5" />;
                      } else if (idx === selectedAnswer) {
                        btnClass = "bg-rose-50 border-rose-400 text-rose-900 opacity-70";
                        Icon = <XCircle className="text-rose-500 shrink-0" size={24} fill="#ffe4e6" />;
                      } else {
                        btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50 grayscale";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => handleAnswer(idx)}
                        disabled={isAnswered}
                        className={`w-full text-left p-5 rounded-2xl border-2 transition-all duration-300 flex items-center gap-5 break-words ${btnClass}`}
                      >
                        {Icon}
                        <span className="text-base md:text-lg font-medium leading-snug text-pretty flex-1">{opt}</span>
                      </button>
                    )
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-10 animate-in slide-in-from-bottom-8 duration-500 fade-in w-full">
                    <div className={`p-6 md:p-8 rounded-[2rem] border-2 relative overflow-hidden break-words w-full ${selectedAnswer === cCase.correctAnswer ? 'bg-emerald-50 border-emerald-200' : 'bg-amber-50 border-amber-200'}`}>
                      <div className={`absolute top-0 right-0 w-32 h-32 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 ${selectedAnswer === cCase.correctAnswer ? 'bg-emerald-400/20' : 'bg-amber-400/20'}`}></div>
                      <h4 className={`font-black text-sm uppercase tracking-widest mb-3 flex items-center gap-2 break-words ${selectedAnswer === cCase.correctAnswer ? 'text-emerald-800' : 'text-amber-800'}`}>
                        <Sparkles size={16} className="shrink-0" /> {selectedAnswer === cCase.correctAnswer ? '¡Excelente Análisis!' : 'Perla Clínica'}
                      </h4>
                      <p className="text-slate-700 text-base md:text-lg leading-relaxed relative z-10 text-pretty">
                        {cCase.explanation}
                      </p>
                    </div>
                    
                    <button 
                      onClick={nextCase}
                      className="mt-8 w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-lg break-words text-center"
                    >
                      Siguiente Caso Clínico <ArrowRight size={20} className="shrink-0" />
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- COMPONENTES AUXILIARES ---

        function NavItem({ icon, label, active, onClick, highlight }) {
          return (
            <button 
              onClick={onClick}
              className={`w-full flex items-center justify-between px-4 py-3.5 rounded-2xl transition-all duration-300 font-semibold group break-words text-left ${
                active 
                  ? 'bg-gradient-to-r from-indigo-600 to-indigo-500 text-white shadow-lg shadow-indigo-500/25' 
                  : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'
              }`}
            >
              <div className="flex items-center gap-3 truncate">
                <div className={`shrink-0 transition-transform duration-300 ${active ? 'scale-110' : 'group-hover:scale-110'}`}>
                  {icon}
                </div>
                <span className="truncate">{label}</span>
              </div>
              {highlight && !active && (
                <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse shrink-0 ml-2"></div>
              )}
            </button>
          );
        }

        function ProgressBar({ label, percent, colorClass, textClass }) {
          return (
            <div className="relative pt-1 group w-full break-words">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-4 mb-3">
                <span className={`text-sm font-bold uppercase tracking-wider inline-block text-wrap ${textClass}`}>{label}</span>
                <span className={`text-sm font-black inline-block shrink-0 px-2 py-1 rounded-md bg-slate-100 self-start sm:self-auto ${textClass}`}>{percent}%</span>
              </div>
              <div className={`overflow-hidden h-3 mb-4 text-xs flex rounded-full bg-slate-100 shadow-inner w-full`}>
                <div style={{ width: `${percent}%` }} className={`shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center ${colorClass} transition-all duration-1000 ease-out group-hover:brightness-110`}></div>
              </div>
            </div>
          );
        }

        function InfoCard({ title, icon, children, color }) {
          const colorMap = {
            rose: 'group-hover:bg-rose-50 border-white hover:border-rose-100',
            purple: 'group-hover:bg-purple-50 border-white hover:border-purple-100',
            teal: 'group-hover:bg-teal-50 border-white hover:border-teal-100'
          };
          
          return (
            <div className={`bg-white/80 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] shadow-xl shadow-slate-200/40 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl flex flex-col group border w-full break-words ${colorMap[color]}`}>
              <div className="flex items-center gap-4 mb-5 w-full">
                <div className="p-3 bg-white rounded-2xl shadow-sm border border-slate-100 group-hover:scale-110 transition-transform duration-300 shrink-0">
                  {icon}
                </div>
                <h3 className="font-extrabold text-lg text-slate-800 leading-tight text-wrap flex-1">{title}</h3>
              </div>
              <p className="text-slate-600 text-sm md:text-base leading-relaxed flex-1 text-pretty">
                {children}
              </p>
            </div>
          );
        }

        function DefItem({ term, def, type, color }) {
          const colorStyles = {
            indigo: 'bg-indigo-100 text-indigo-700',
            amber: 'bg-amber-100 text-amber-700',
            rose: 'bg-rose-100 text-rose-700',
            teal: 'bg-teal-100 text-teal-700',
          };
          
          return (
            <div className="p-6 bg-slate-50/50 rounded-2xl border border-slate-100 hover:border-indigo-200 hover:bg-white transition-colors duration-300 flex flex-col group w-full break-words">
              <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3 mb-4 w-full">
                <span className="font-black text-xl text-slate-800 leading-tight group-hover:text-indigo-600 transition-colors text-wrap flex-1">{term}</span>
                <span className={`text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full self-start shrink-0 shadow-sm text-center ${colorStyles[color]}`}>{type}</span>
              </div>
              <p className="text-sm text-slate-600 leading-relaxed font-medium flex-1 text-pretty">{def}</p>
            </div>
          );
        }

        // --- INICIALIZACIÓN DE REACT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
